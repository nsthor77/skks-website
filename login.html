<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Panya SchoolKit</title>
  <meta name="description" content="Sign in to Panya SchoolKit" />

  <link rel="stylesheet" href="css/brand.css" />
  <link rel="icon" type="image/png" href="images/panya-mark.png" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'IBM Plex Sans Thai', 'Inter', sans-serif;
      color: var(--pk-ink-soft);
      background:
        radial-gradient(ellipse 80% 60% at 90% 0%, rgba(212, 165, 116, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse 100% 70% at 10% 100%, rgba(30, 64, 175, 0.10) 0%, transparent 50%),
        var(--pk-canvas);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    /* Brand top */
    .brand-top {
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .brand-logo img {
      height: 36px;
      width: auto;
      display: block;
    }
    .school-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid var(--pk-border);
      border-radius: 100px;
      font-size: 12px;
      color: var(--pk-ink);
      font-weight: 600;
    }
    .school-tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pk-gold-500); }

    .login-card {
      background: var(--pk-paper);
      border-radius: 18px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      border: 1px solid var(--pk-border);
      box-shadow: 0 20px 50px -12px rgba(15, 26, 54, 0.15);
    }

    .login-title {
      font-family: 'IBM Plex Sans Thai', 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--pk-ink);
      margin: 0 0 4px;
      text-align: center;
      letter-spacing: -0.015em;
    }
    .login-subtitle {
      color: var(--pk-ash);
      font-size: 14px;
      text-align: center;
      margin: 0 0 24px;
    }

    /* Tabs */
    .login-tabs {
      display: flex;
      background: var(--pk-canvas);
      border: 1px solid var(--pk-border);
      border-radius: 100px;
      padding: 3px;
      margin-bottom: 22px;
    }
    .login-tab {
      flex: 1;
      padding: 9px 16px;
      text-align: center;
      border-radius: 100px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      color: var(--pk-ash);
      border: none;
      background: transparent;
      transition: all 0.15s;
      font-family: inherit;
    }
    .login-tab.active {
      background: var(--pk-paper);
      color: var(--pk-blue-800);
      box-shadow: 0 1px 3px rgba(30,64,175,0.12);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--pk-ink-soft);
    }
    .form-group input {
      padding: 12px 14px;
      border: 1px solid var(--pk-border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--pk-ink);
      background: var(--pk-paper);
      transition: all 0.15s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--pk-blue-600);
      box-shadow: 0 0 0 3px var(--pk-blue-100);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .login-btn {
      padding: 13px 22px;
      background: var(--pk-blue-800);
      color: var(--pk-paper);
      border: 1px solid var(--pk-blue-800);
      border-radius: 100px;
      font-weight: 600;
      font-size: 14.5px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 6px;
      font-family: inherit;
      box-shadow: 0 2px 6px rgba(30,64,175,0.18);
    }
    .login-btn:hover:not(:disabled) {
      background: var(--pk-blue-900);
      border-color: var(--pk-blue-900);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(30,64,175,0.25);
    }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .form-footer {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: var(--pk-ash);
    }
    .form-footer a {
      color: var(--pk-blue-600);
      text-decoration: none;
      font-weight: 500;
    }
    .form-footer a:hover { text-decoration: underline; }

    .alert {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
      border: 1px solid;
      line-height: 1.5;
    }
    .alert.show { display: block; }
    .alert.error { background: var(--pk-danger-bg);  color: var(--pk-danger);  border-color: #FECACA; }
    .alert.success { background: var(--pk-success-bg); color: var(--pk-success); border-color: #BBF7D0; }

    /* Language toggle (top right) */
    .lang-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--pk-paper);
      border: 1px solid var(--pk-border);
      border-radius: 100px;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      gap: 2px;
    }
    .lang-toggle a {
      text-decoration: none;
      color: var(--pk-ash);
      padding: 5px 12px;
      border-radius: 100px;
    }
    .lang-toggle a.active {
      color: var(--pk-blue-800);
      background: var(--pk-blue-50);
    }

    #signupForm { display: none; }

    .info-banner {
      background: var(--pk-blue-50);
      border: 1px solid var(--pk-blue-100);
      padding: 11px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 12.5px;
      color: var(--pk-blue-800);
      line-height: 1.55;
    }

    /* Powered by footer */
    .powered-by {
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      color: var(--pk-mist-text);
    }
    .powered-by img {
      height: 16px;
      width: auto;
      opacity: 0.7;
    }

    /* Legal links */
    .legal-bar {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: var(--pk-mist-text);
    }
    .legal-bar a {
      color: var(--pk-ash);
      text-decoration: none;
      margin: 0 8px;
      font-weight: 500;
    }
    .legal-bar a:hover { color: var(--pk-blue-800); }
  </style>
</head>
<body>

  <!-- Language toggle (EN default) -->
  <div class="lang-toggle">
    <a href="#" data-lang="en" class="active" onclick="event.preventDefault();setLang('en')">EN</a>
    <a href="#" data-lang="th" onclick="event.preventDefault();setLang('th')">TH</a>
  </div>

  <!-- Brand top -->
  <div class="brand-top">
    <a href="/" class="brand-logo">
      <img src="images/panya-schoolkit-lockup.png" alt="Panya SchoolKit" />
    </a>
    <div class="school-tag" id="schoolTag" style="display:none;">
      <span class="dot"></span>
      <span id="schoolTagName" data-i18n="login.subtitle"></span>
    </div>
  </div>

  <div class="login-card">
    <h1 class="login-title" data-i18n="login.title">เข้าสู่ระบบ</h1>
    <p class="login-subtitle" data-i18n="login.welcome">ยินดีต้อนรับกลับ</p>

    <div class="login-tabs">
      <button class="login-tab active" id="tabLogin" onclick="showTab('login')" data-i18n="login.tab.signin">เข้าสู่ระบบ</button>
      <button class="login-tab" id="tabSignup" onclick="showTab('signup')" data-i18n="login.tab.signup">สมัครสมาชิก</button>
    </div>

    <div class="alert" id="alertBox"></div>

    <!-- LOGIN FORM -->
    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label data-i18n="login.email">อีเมล</label>
        <input type="email" id="loginEmail" required autocomplete="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label data-i18n="login.password">รหัสผ่าน</label>
        <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="••••••••" />
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <span data-i18n="login.btn.signin">เข้าสู่ระบบ</span>
      </button>

      <div class="form-footer">
        <a href="#" onclick="event.preventDefault();handleResetPassword()" data-i18n="login.forgot">ลืมรหัสผ่าน?</a>
      </div>
    </form>

    <!-- SIGNUP FORM -->
    <form class="login-form" id="signupForm" onsubmit="handleSignup(event)">
      <div class="info-banner" data-i18n="login.signup.info">
        📝 บัญชีใหม่จะถูกตั้งเป็น <strong>นักเรียน/ผู้ปกครอง</strong> โดยอัตโนมัติ ติดต่อผู้ดูแลเพื่อเปลี่ยนสิทธิ์
      </div>

      <div class="form-row">
        <div class="form-group">
          <label data-i18n="login.firstname">ชื่อจริง</label>
          <input type="text" id="signupFirstName" required placeholder="สมชาย" />
        </div>
        <div class="form-group">
          <label data-i18n="login.lastname">นามสกุล</label>
          <input type="text" id="signupLastName" required placeholder="ใจดี" />
        </div>
      </div>

      <div class="form-group">
        <label data-i18n="login.email">อีเมล</label>
        <input type="email" id="signupEmail" required autocomplete="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label data-i18n="login.password">รหัสผ่าน</label>
        <input type="password" id="signupPassword" required autocomplete="new-password" placeholder="อย่างน้อย 8 ตัวอักษร" minlength="8" />
      </div>

      <div class="form-group">
        <label data-i18n="login.password.confirm">ยืนยันรหัสผ่าน</label>
        <input type="password" id="signupPasswordConfirm" required autocomplete="new-password" placeholder="พิมพ์รหัสผ่านซ้ำ" minlength="8" />
      </div>

      <button type="submit" class="login-btn" id="signupBtn">
        <span data-i18n="login.btn.signup">สร้างบัญชี</span>
      </button>
    </form>
  </div>

  <!-- Powered by -->
  <div class="powered-by">
    <span data-i18n="login.poweredBy">Powered by</span>
    <strong style="color: var(--pk-blue-800); font-family: 'Inter', sans-serif;">Panya SchoolKit</strong>
  </div>

  <!-- Legal footer -->
  <div class="legal-bar">
    <a href="/pages/terms.html" data-i18n="footer.terms">ข้อกำหนด</a>·
    <a href="/pages/privacy.html" data-i18n="footer.privacy">ความเป็นส่วนตัว</a>·
    <a href="mailto:support@panyaschoolkit.com" data-i18n="footer.contact">ติดต่อ</a>
  </div>

  <!-- Scripts -->
  <script src="js/i18n.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/role-guard.js"></script>

  <script>
    // ============= TRANSLATIONS =============
    const t = {
      th: {
        'login.title': 'เข้าสู่ระบบ',
        'login.welcome': 'ยินดีต้อนรับกลับ',
        'login.subtitle': '',
        'login.tab.signin': 'เข้าสู่ระบบ',
        'login.tab.signup': 'สมัครสมาชิก',
        'login.email': 'อีเมล',
        'login.password': 'รหัสผ่าน',
        'login.password.confirm': 'ยืนยันรหัสผ่าน',
        'login.firstname': 'ชื่อจริง',
        'login.lastname': 'นามสกุล',
        'login.btn.signin': 'เข้าสู่ระบบ',
        'login.btn.signup': 'สร้างบัญชี',
        'login.forgot': 'ลืมรหัสผ่าน?',
        'login.poweredBy': 'Powered by',
        'login.signup.info': '📝 บัญชีใหม่จะถูกตั้งเป็น <strong>นักเรียน/ผู้ปกครอง</strong> โดยอัตโนมัติ ติดต่อผู้ดูแลเพื่อเปลี่ยนสิทธิ์',
        'footer.terms': 'ข้อกำหนด',
        'footer.privacy': 'ความเป็นส่วนตัว',
        'footer.contact': 'ติดต่อ',
        'msg.signing_in': 'กำลังเข้าสู่ระบบ...',
        'msg.creating': 'กำลังสร้างบัญชี...',
        'msg.password_mismatch': 'รหัสผ่านไม่ตรงกัน',
        'msg.signup_success': '✅ สร้างบัญชีสำเร็จ! กรุณาตรวจอีเมลเพื่อยืนยัน แล้วเข้าสู่ระบบ',
        'msg.reset_sent': '📧 ส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลของคุณแล้ว',
        'msg.email_required': 'กรุณากรอกอีเมลก่อน'
      },
      en: {
        'login.title': 'Sign In',
        'login.welcome': 'Welcome back',
        'login.subtitle': '',
        'login.tab.signin': 'Sign In',
        'login.tab.signup': 'Sign Up',
        'login.email': 'Email',
        'login.password': 'Password',
        'login.password.confirm': 'Confirm Password',
        'login.firstname': 'First Name',
        'login.lastname': 'Last Name',
        'login.btn.signin': 'Sign In',
        'login.btn.signup': 'Create Account',
        'login.forgot': 'Forgot password?',
        'login.poweredBy': 'Powered by',
        'login.signup.info': '📝 New users are registered as <strong>Student/Parent</strong> by default. Contact admin to upgrade your role.',
        'footer.terms': 'Terms',
        'footer.privacy': 'Privacy',
        'footer.contact': 'Contact',
        'msg.signing_in': 'Signing in...',
        'msg.creating': 'Creating account...',
        'msg.password_mismatch': 'Passwords do not match',
        'msg.signup_success': '✅ Account created! Please check your email to verify, then sign in.',
        'msg.reset_sent': '📧 Password reset link sent to your email',
        'msg.email_required': 'Please enter your email first'
      }
    };

    // Sprint 10.6: synced with shared i18n.js (pk_lang storage)
    function getLang() {
      return localStorage.getItem('pk_lang') || localStorage.getItem('skks_lang') || 'en';
    }

    function setLang(lang) {
      localStorage.setItem('pk_lang', lang);
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[lang] && t[lang][key]) el.innerHTML = t[lang][key];
      });
      document.querySelectorAll('.lang-toggle a').forEach(a => {
        a.classList.toggle('active', a.getAttribute('data-lang') === lang);
      });
    }
    function getText(key) { return (t[getLang()] || t.en)[key] || key; }

    // Listen for shared toggle changes
    document.addEventListener('langchange', (e) => setLang(e.detail.lang));

    setLang(getLang());

    // ============= UI =============
    function showTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const tabLogin = document.getElementById('tabLogin');
      const tabSignup = document.getElementById('tabSignup');
      hideAlert();
      if (tab === 'login') {
        loginForm.style.display = 'flex';
        signupForm.style.display = 'none';
        tabLogin.classList.add('active');
        tabSignup.classList.remove('active');
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'flex';
        tabLogin.classList.remove('active');
        tabSignup.classList.add('active');
      }
    }

    function showAlert(message, type = 'error') {
      const a = document.getElementById('alertBox');
      a.className = 'alert show ' + type;
      a.innerHTML = message;
    }
    function hideAlert() { document.getElementById('alertBox').className = 'alert'; }

    // ============= AUTH =============
    async function handleLogin(event) {
      event.preventDefault();
      hideAlert();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '⏳ ' + getText('msg.signing_in');
      const result = await auth.login({ email, password });
      if (result.success) {
        const profile = result.data.profile;
        const params = new URLSearchParams(window.location.search);
        const nextParam = params.get('next');
        const redirect = nextParam || roleGuard.getRedirectAfterLogin(profile?.role || 'student');
        window.location.href = redirect;
      } else {
        showAlert('❌ ' + result.error, 'error');
        btn.disabled = false;
        btn.innerHTML = '<span>' + getText('login.btn.signin') + '</span>';
      }
    }

    async function handleSignup(event) {
      event.preventDefault();
      hideAlert();
      const firstName = document.getElementById('signupFirstName').value.trim();
      const lastName = document.getElementById('signupLastName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
      const btn = document.getElementById('signupBtn');

      if (password !== passwordConfirm) {
        showAlert('❌ ' + getText('msg.password_mismatch'), 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '⏳ ' + getText('msg.creating');

      const result = await auth.signup({ email, password, firstName, lastName, role: 'student' });

      if (result.success) {
        showAlert(getText('msg.signup_success'), 'success');
        setTimeout(() => {
          showTab('login');
          document.getElementById('loginEmail').value = email;
        }, 2000);
      } else {
        showAlert('❌ ' + result.error, 'error');
      }
      btn.disabled = false;
      btn.innerHTML = '<span>' + getText('login.btn.signup') + '</span>';
    }

    async function handleResetPassword() {
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) { showAlert('⚠️ ' + getText('msg.email_required'), 'error'); return; }
      const result = await auth.resetPassword(email);
      if (result.success) showAlert(getText('msg.reset_sent'), 'success');
      else showAlert('❌ ' + result.error, 'error');
    }

    // Auto-redirect if logged in
    (async () => {
      const session = await auth.getSession();
      if (session) {
        const profile = await auth.getProfile();
        if (profile) window.location.href = roleGuard.getRedirectAfterLogin(profile.role);
      }
    })();

    // ===== White-label: show THIS school's logo + name + color on its own login =====
    // Resolves the tenant from the hostname ({slug}.panyaschoolkit.com or a custom domain)
    // via the public (anon) RPC get_public_school. On the main domain it stays
    // product-branded (PanyaSchoolKit). Never shows another school's name.
    async function applyTenantBrand() {
      try {
        const host = (location.hostname || '').toLowerCase();
        let slug = null, domain = null;
        if (/\.panyaschoolkit\.com$/.test(host)) {
          const sub = host.split('.')[0];
          if (sub && !['www', 'app', 'panyaschoolkit'].includes(sub)) slug = sub;
        } else if (!/(^localhost$|^127\.|\.vercel\.app$|^$)/.test(host)) {
          domain = host;  // school's own custom domain
        }
        if (!slug && !domain) return;  // main domain → keep product branding

        const { data } = await supabaseClient.rpc('get_public_school', { p_slug: slug, p_domain: domain });
        const s = data && data.school;
        if (!s) return;

        // School name in the tag (Thai-first, English when EN selected)
        const lang = getLang();
        const name = (lang === 'en' && s.name_en) ? s.name_en : (s.name || s.name_en);
        if (name) {
          const tag = document.getElementById('schoolTag');
          const nameEl = document.getElementById('schoolTagName');
          if (nameEl) nameEl.textContent = name;
          if (tag) tag.style.display = '';
          document.title = name;
        }
        // School's own logo
        if (s.logo_url) {
          const img = document.querySelector('.brand-logo img');
          if (img) { img.src = s.logo_url; img.style.height = 'auto'; img.style.maxHeight = '56px'; }
        }
        // School's theme color on the primary button
        if (s.theme_color) {
          const r = document.documentElement;
          r.style.setProperty('--pk-blue-800', s.theme_color);
          r.style.setProperty('--pk-blue-900', s.theme_color);
        }
      } catch (e) { /* fail silently → product branding */ }
    }
    window.addEventListener('tenant-resolved', applyTenantBrand);
    applyTenantBrand();
  </script>

  <!-- Cookie consent banner -->
  <script src="js/cookie-consent.js" defer></script>
</body>
</html>
