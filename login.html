<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Sign in — SKKS</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" /><link rel="stylesheet" href="css/premium.css" /><link rel="icon" type="image/png" href="images/logo.png" /><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style> body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px} .login-wrap{max-width:440px;width:100%} .login-header{text-align:center;margin-bottom:32px} .login-header .logo{display:inline-flex;align-items:center;gap:12px;font-weight:700;font-size:22px;color:var(--forest-900);letter-spacing:-0.02em;margin-bottom:24px;text-decoration:none} .login-header .logo img{width:40px;height:40px;border-radius:10px} .login-header h1{font-size:30px;font-weight:700;letter-spacing:-0.025em;color:var(--forest-900);margin-bottom:8px} .login-header p{color:var(--text-2);font-size:14px} .login-card{background:white;border-radius:var(--r-2xl);padding:36px 32px;border:0.5px solid var(--border);box-shadow:var(--shadow-md)} .help-link{text-align:center;margin-top:24px;font-size:13px;color:var(--text-3)} .help-link a{color:var(--forest-700);font-weight:500} .demo-hint{margin-top:20px;padding:16px;background:var(--gold-50);border:0.5px solid var(--gold-100);border-radius:var(--r-md);font-size:13px;color:var(--gray-700)} .demo-hint strong{color:var(--forest-900)} .demo-hint code{background:white;padding:2px 6px;border-radius:4px;font-size:12px;color:var(--forest-900);font-family:'JetBrains Mono',monospace} .role-tabs{display:flex;gap:4px;background:var(--gray-100);padding:3px;border-radius:var(--r-md);margin-bottom:24px} .role-tabs button{flex:1;padding:8px 12px;background:transparent;border:none;border-radius:6px;font-size:13px;font-weight:600;color:var(--text-3);cursor:pointer;font-family:inherit;transition:all var(--fast)} .role-tabs button.active{background:white;color:var(--forest-900);box-shadow:var(--shadow-sm)} </style></head><body><div class="login-wrap"><div class="login-header"><a href="index.html" class="logo"><img src="images/logo.png" alt="SKKS" /><span>SKKS</span></a><h1>Welcome back</h1><p>Sign in to your school portal</p></div><div class="login-card"><form id="loginForm"><div class="form-group"><label>Email</label><input type="email" id="email" required placeholder="you@example.com" autocomplete="username" /></div><div class="form-group"><label style="display:flex;justify-content:space-between;align-items:center;"><span>Password</span><a href="#" style="font-size:12px;font-weight:500;color:var(--forest-700);text-decoration:none;">Forgot?</a></label><input type="password" id="password" required placeholder="••••••••" autocomplete="current-password" /></div><button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="signInBtn"> Sign in </button><div id="errorMsg" style="display:none;margin-top:16px;padding:12px;background:var(--danger-bg);color:var(--danger);border-radius:var(--r-md);font-size:13px;text-align:center;"></div></form></div><div class="demo-hint"><strong>Demo accounts</strong> · password: <code>skks2026</code><div style="margin-top:8px;line-height:1.7;"><code>admin@suansonkk.demo</code><br> ‍ <code>teacher@suansonkk.demo</code><br><code>demo-pim@suansonkk.demo</code></div></div><div class="help-link"> Don't have an account? <a href="admissions.html">Apply for admission →</a></div></div><script> const SUPABASE_URL = 'https://nuzhkhchimemuetoewzn.supabase.co'; const SUPABASE_KEY = 'sb_publishable_prRghlKfBE1VqrpJDZmmSA_1XifObOJ'; const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); document.getElementById('loginForm').addEventListener('submit', async (e) => { e.preventDefault(); const btn = document.getElementById('signInBtn'); const errorEl = document.getElementById('errorMsg'); errorEl.style.display = 'none'; btn.disabled = true; btn.innerHTML = '<span class="loading"></span> Signing in...'; try { const email = document.getElementById('email').value; const password = document.getElementById('password').value; const { data, error } = await sb.auth.signInWithPassword({ email, password }); if (error) throw error; const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single(); const role = profile?.role || 'student'; let redirect = '/'; switch (role) { case 'developer': case 'owner': case 'admin': case 'staff': redirect = '/pages/dashboard.html'; break; case 'teacher': redirect = '/pages/grades-admin.html'; break; case 'student': case 'parent': redirect = '/pages/student-dashboard.html'; break; } window.location.href = redirect; } catch (err) { errorEl.textContent = ' ' + (err.message || 'Login failed'); errorEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign in'; } }); </script></body></html>
