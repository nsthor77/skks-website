<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>โรงอาหาร/กระเป๋าเงิน — PanyaSchoolKit</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../images/panya-mark.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--pk-blue-800:#1E40AF;--pk-canvas:#EBF0FA;--pk-paper:#FFFFFF;--pk-ink:#0F1A36;--pk-ash:#4B5670;--pk-border:#D8DEE9;--pk-border-em:#A8B2C4;--pk-success:#065F46;--pk-success-bg:#D1FAE5;--pk-danger:#991B1B;--pk-danger-bg:#FEE2E2;}
    *{box-sizing:border-box;margin:0;padding:0;} body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:var(--pk-canvas);color:var(--pk-ink);min-height:100vh;}
    .topbar{background:var(--pk-paper);border-bottom:1px solid var(--pk-border);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;} .topbar img{height:26px;} .back-link{color:var(--pk-ash);text-decoration:none;font-size:13.5px;}
    .container{max-width:760px;margin:0 auto;padding:24px;}
    .page-title h1{font-size:23px;font-weight:700;} .page-title p{color:var(--pk-ash);font-size:13.5px;margin:4px 0 16px;}
    .card{background:var(--pk-paper);border:1px solid var(--pk-border);border-radius:14px;padding:18px 20px;margin-bottom:16px;}
    label.fl{display:block;font-size:12px;color:var(--pk-ash);font-weight:600;margin-bottom:4px;}
    input,select{padding:9px 12px;border:1px solid var(--pk-border);border-radius:8px;font-family:inherit;font-size:14px;}
    .btn{padding:10px 16px;border-radius:9px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:none;}
    .btn-topup{background:#065F46;color:#fff;} .btn-spend{background:#B45309;color:#fff;} .btn-sm{padding:6px 12px;font-size:12px;font-weight:600;}
    .bal{font-size:40px;font-weight:800;color:var(--pk-blue-800);text-align:center;margin:6px 0;}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
    .tx{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F1F5F9;font-size:13.5px;}
    .tx .up{color:#065F46;font-weight:700;} .tx .dn{color:#B45309;font-weight:700;}
    .empty{text-align:center;color:var(--pk-ash);padding:24px;}
    .toast{position:fixed;bottom:28px;right:28px;background:var(--pk-ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;z-index:200;} .toast.show{opacity:1;}.toast.success{background:var(--pk-success);}.toast.error{background:var(--pk-danger);}
    @media(max-width:640px){.container{padding:14px;}input,select{font-size:16px;}}
  </style>
</head>
<body>
  <div class="topbar">
    <a href="../index.html"><img src="../images/panya-schoolkit-lockup.png" alt="Panya SchoolKit" /></a>
    <a href="dashboard.html" class="back-link">← แดชบอร์ด</a>
  </div>
  <div class="container">
    <div class="page-title"><h1>🍽️ โรงอาหาร / กระเป๋าเงินนักเรียน</h1><p>เติมเงิน · ตัดเงินค่าอาหาร · ดูยอดคงเหลือรายคน</p></div>

    <div class="card">
      <label class="fl">เลือกนักเรียน</label>
      <select id="student" onchange="loadWallet()" style="width:100%;"><option value="">— เลือกนักเรียน —</option></select>
    </div>

    <div class="card" id="walletCard" style="display:none;">
      <div style="font-size:13px;color:var(--pk-ash);text-align:center;">ยอดคงเหลือ</div>
      <div class="bal" id="bal">฿0</div>
      <div class="row" style="justify-content:center;">
        <div><label class="fl">จำนวนเงิน (บาท)</label><input type="number" id="amt" min="0" style="width:140px;" /></div>
        <input id="note" placeholder="หมายเหตุ" style="width:160px;" />
        <button class="btn btn-topup" onclick="move('topup')">+ เติมเงิน</button>
        <button class="btn btn-spend" onclick="move('spend')">– ตัดเงิน</button>
      </div>
      <div style="margin-top:16px;font-weight:700;font-size:14px;">ประวัติล่าสุด</div>
      <div id="txs"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="../js/i18n.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/role-guard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => { const p=await roleGuard.requireTeacher(); if(!p) return; loadStudents(); });
    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    async function loadStudents(){
      let all=[], from=0; const size=1000;
      while(true){ const { data, error } = await supabaseClient.from('students').select('id,first_name_th,last_name_th,grade,classroom,status').range(from,from+size-1);
        if(error) break; all=all.concat(data||[]); if(!data||data.length<size) break; from+=size; if(from>20000) break; }
      all=all.filter(s=>!s.status||s.status==='active').sort((a,b)=>((a.grade||'')+(a.classroom||'')).localeCompare((b.grade||'')+(b.classroom||''),'th',{numeric:true}));
      document.getElementById('student').insertAdjacentHTML('beforeend', all.map(s=>`<option value="${s.id}">${esc((s.first_name_th||'')+' '+(s.last_name_th||''))} · ${esc(s.grade||'')}${s.classroom?('/'+esc(s.classroom)):''}</option>`).join(''));
    }

    async function loadWallet(){
      const sid=document.getElementById('student').value;
      const card=document.getElementById('walletCard');
      if(!sid){ card.style.display='none'; return; }
      const { data } = await supabaseClient.rpc('get_wallet',{p_student_id:sid});
      card.style.display='block';
      document.getElementById('bal').textContent='฿'+Number((data&&data.balance)||0).toLocaleString('en-US');
      const tx=(data&&data.transactions)||[];
      document.getElementById('txs').innerHTML = tx.length ? tx.map(t=>`<div class="tx"><span>${t.type==='topup'?'เติมเงิน':'ค่าอาหาร'}${t.note?(' · '+esc(t.note)):''}<br><span style="font-size:11px;color:#9AA3B5;">${new Date(t.at).toLocaleString('th-TH')}</span></span>
        <span class="${t.type==='topup'?'up':'dn'}">${t.type==='topup'?'+':'-'}฿${Number(t.amount).toLocaleString('en-US')}</span></div>`).join('') : '<div class="empty">ยังไม่มีรายการ</div>';
    }

    async function move(type){
      const sid=document.getElementById('student').value; if(!sid){ toast('เลือกนักเรียน','error'); return; }
      const amt=parseFloat(document.getElementById('amt').value); if(!amt||amt<=0){ toast('ใส่จำนวนเงิน','error'); return; }
      const { data, error } = await supabaseClient.rpc('wallet_move',{p_student_id:sid,p_type:type,p_amount:amt,p_note:document.getElementById('note').value.trim()||null});
      if(error||!data||!data.success){ toast((data&&data.error)||(error&&error.message)||'ไม่สำเร็จ','error'); return; }
      toast((type==='topup'?'เติมเงิน':'ตัดเงิน')+'สำเร็จ','success');
      document.getElementById('amt').value=''; document.getElementById('note').value=''; loadWallet();
    }

    let toastTimer=null;
    function toast(msg,type){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show '+(type||''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className='toast',2400); }
  </script>
</body>
</html>
