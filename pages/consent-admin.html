<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>หนังสือขออนุญาต — PanyaSchoolKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../images/panya-mark.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--pk-blue-800:#1E40AF;--pk-blue-50:#EEF3FF;--pk-canvas:#EBF0FA;--pk-paper:#FFFFFF;--pk-ink:#0F1A36;--pk-ink-soft:#1F2A4E;--pk-ash:#4B5670;--pk-border:#D8DEE9;--pk-border-em:#A8B2C4;--pk-success:#065F46;--pk-success-bg:#D1FAE5;--pk-danger:#991B1B;--pk-danger-bg:#FEE2E2;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:var(--pk-canvas);color:var(--pk-ink);min-height:100vh;}
    .topbar{background:var(--pk-paper);border-bottom:1px solid var(--pk-border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .topbar-left{display:flex;align-items:center;gap:16px;} .topbar img{height:26px;}
    .back-link{color:var(--pk-ash);text-decoration:none;font-size:13.5px;padding:6px 12px;border-radius:8px;}
    .container{max-width:880px;margin:0 auto;padding:24px;}
    .page-header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:16px;}
    .page-title h1{font-size:23px;font-weight:700;} .page-title p{color:var(--pk-ash);font-size:13.5px;margin-top:4px;}
    .btn{padding:9px 16px;border-radius:9px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border:none;}
    .btn-primary{background:var(--pk-blue-800);color:#fff;} .btn-secondary{background:var(--pk-paper);color:var(--pk-ink-soft);border:1px solid var(--pk-border-em);} .btn-danger{background:var(--pk-danger-bg);color:var(--pk-danger);} .btn-sm{padding:6px 12px;font-size:12px;}
    .card{background:var(--pk-paper);border:1px solid var(--pk-border);border-radius:12px;padding:15px 18px;margin-bottom:12px;}
    .card h3{font-size:15.5px;font-weight:700;} .card .meta{font-size:12.5px;color:var(--pk-ash);margin-top:5px;}
    .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;background:var(--pk-blue-50);color:var(--pk-blue-800);font-weight:600;margin-right:5px;}
    .tag.off{background:#F1F5F9;color:#64748B;}
    .m{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:flex-start;}
    .m-actions{display:flex;gap:6px;flex-wrap:wrap;}
    .modal-bd{position:fixed;inset:0;background:rgba(15,26,54,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;} .modal-bd.show{display:flex;}
    .modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;}
    .modal h2{font-size:18px;margin-bottom:14px;}
    .field{margin-bottom:12px;} .field label{display:block;font-size:12px;color:var(--pk-ash);font-weight:600;margin-bottom:4px;}
    .field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--pk-border);border-radius:8px;font-family:inherit;font-size:14px;}
    .row2{display:flex;gap:10px;} .row2>div{flex:1;}
    .chk{display:flex;align-items:center;gap:8px;font-size:13.5px;cursor:pointer;} .chk input{width:auto;}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
    table.resp{width:100%;border-collapse:collapse;font-size:13px;} table.resp th,table.resp td{padding:7px 8px;border-bottom:1px solid #EEF2F7;text-align:left;} table.resp th{font-size:11px;color:var(--pk-ash);text-transform:uppercase;}
    .badge{padding:3px 9px;border-radius:20px;font-weight:700;font-size:11.5px;}
    .b-ap{background:#D1FAE5;color:#065F46;}.b-de{background:#FEE2E2;color:#991B1B;}.b-ac{background:#DBEAFE;color:#1E40AF;}.b-no{background:#F1F5F9;color:#64748B;}
    .empty{text-align:center;color:var(--pk-ash);padding:40px;}
    .toast{position:fixed;bottom:28px;right:28px;background:var(--pk-ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;z-index:200;} .toast.show{opacity:1;}.toast.success{background:var(--pk-success);}.toast.error{background:var(--pk-danger);}
    @media(max-width:640px){.container{padding:14px;}.modal input,.modal select,.modal textarea{font-size:16px;}.row2{flex-direction:column;}}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <a href="../index.html"><img src="../images/panya-schoolkit-lockup.png" alt="Panya SchoolKit" /></a>
      <a href="dashboard.html" class="back-link">← แดชบอร์ด</a>
    </div><div></div>
  </div>

  <div class="container">
    <div class="page-header">
      <div class="page-title"><h1>📝 หนังสือขออนุญาต / ขอความยินยอม</h1>
        <p>สร้างหนังสือถึงผู้ปกครอง — เซ็นตอบออนไลน์รายคน ติดตามว่าใครตอบแล้ว</p></div>
      <button class="btn btn-primary" onclick="openCreate()">➕ สร้างหนังสือ</button>
    </div>
    <div id="list"><div class="empty">⏳ กำลังโหลด...</div></div>
  </div>

  <!-- create/edit -->
  <div class="modal-bd" id="formModal"><div class="modal">
    <h2 id="formTitle">➕ สร้างหนังสือ</h2>
    <input type="hidden" id="fId" />
    <div class="field"><label>หัวข้อ *</label><input id="fTitle" placeholder="เช่น ขออนุญาตพานักเรียนไปทัศนศึกษา" /></div>
    <div class="field"><label>รายละเอียด</label><textarea id="fBody" rows="4"></textarea></div>
    <div class="row2">
      <div class="field"><label>ประเภท</label>
        <select id="fMode"><option value="consent">ขออนุญาต (อนุญาต/ไม่อนุญาต)</option><option value="acknowledge">แจ้งเพื่อทราบ (รับทราบ)</option></select>
      </div>
      <div class="field"><label>กำหนดตอบกลับ</label><input type="date" id="fDeadline" /></div>
    </div>
    <div class="row2">
      <div class="field"><label>ส่งถึง</label>
        <select id="fAudience" onchange="toggleTarget()"><option value="all">ทุกคน</option><option value="grade">เฉพาะชั้น</option><option value="classroom">เฉพาะห้อง</option></select>
      </div>
      <div class="field" id="targetWrap" style="display:none;"><label id="targetLabel">ระบุ</label><input id="fTarget" placeholder="เช่น ป.5 หรือ 5/1" /></div>
    </div>
    <div class="field"><label class="chk"><input type="checkbox" id="fSig" checked> ต้องลงชื่อ (เซ็น) ตอนตอบ</label></div>
    <div class="field"><label class="chk"><input type="checkbox" id="fActive" checked> เปิดใช้งาน</label></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeForm()">ยกเลิก</button><button class="btn btn-primary" id="saveBtn" onclick="saveForm()">💾 บันทึก</button></div>
  </div></div>

  <!-- responses -->
  <div class="modal-bd" id="respModal"><div class="modal" style="max-width:640px;">
    <h2>📊 ผลการตอบกลับ</h2>
    <div id="respBody"><div class="empty">⏳</div></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="document.getElementById('respModal').classList.remove('show')">ปิด</button></div>
  </div></div>

  <div class="toast" id="toast"></div>

  <script src="../js/i18n.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/role-guard.js"></script>
  <script>
    let forms = [];
    const DEC = { approved:['อนุญาต','b-ap'], declined:['ไม่อนุญาต','b-de'], acknowledged:['รับทราบ','b-ac'] };

    document.addEventListener('DOMContentLoaded', async () => {
      const prof = await roleGuard.requireTeacher(); if (!prof) return; load();
    });
    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function getForm(id){ return forms.find(f=>f.id===id)||{}; }

    async function load() {
      const { data, error } = await supabaseClient.rpc('list_consent_forms');
      const box = document.getElementById('list');
      if (error) { box.innerHTML='<div class="empty">'+esc(error.message)+'</div>'; return; }
      forms = data || [];
      if (!forms.length) { box.innerHTML='<div class="empty">ยังไม่มีหนังสือ — กด “➕ สร้างหนังสือ”</div>'; return; }
      box.innerHTML = forms.map(f => {
        const aud = f.audience==='all'?'ทุกคน':(f.audience==='grade'?('ชั้น '+esc(f.target_grade||'')):('ห้อง '+esc(f.target_classroom||'')));
        return `<div class="card"><div class="m">
          <div style="flex:1;min-width:0;">
            <h3>${f.mode==='acknowledge'?'📢 ':'✍️ '}${esc(f.title)}</h3>
            <div class="meta"><span class="tag">${aud}</span>
              <span class="tag ${f.active?'':'off'}">${f.active?'เปิด':'ปิด'}</span>
              ${f.deadline?('· ภายใน '+new Date(f.deadline).toLocaleDateString('th-TH')):''}
              · ตอบแล้ว <b>${f.responses||0}</b> คน</div>
          </div>
          <div class="m-actions">
            <button class="btn btn-secondary btn-sm" onclick="viewResp('${f.id}')">📊 ผลตอบ</button>
            <button class="btn btn-secondary btn-sm" onclick="openEdit('${f.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="delForm('${f.id}')">🗑️</button>
          </div></div></div>`;
      }).join('');
    }

    function toggleTarget(){
      const a=document.getElementById('fAudience').value;
      document.getElementById('targetWrap').style.display = a==='all'?'none':'block';
      document.getElementById('targetLabel').textContent = a==='grade'?'ระบุชั้น (เช่น ป.5)':'ระบุห้อง (เช่น 5/1)';
    }
    function openCreate(){
      document.getElementById('fId').value=''; document.getElementById('formTitle').textContent='➕ สร้างหนังสือ';
      ['fTitle','fBody','fTarget','fDeadline'].forEach(i=>document.getElementById(i).value='');
      document.getElementById('fMode').value='consent'; document.getElementById('fAudience').value='all';
      document.getElementById('fSig').checked=true; document.getElementById('fActive').checked=true;
      toggleTarget(); document.getElementById('formModal').classList.add('show');
    }
    function openEdit(id){
      const f=getForm(id); document.getElementById('fId').value=f.id; document.getElementById('formTitle').textContent='✏️ แก้ไขหนังสือ';
      document.getElementById('fTitle').value=f.title||''; document.getElementById('fBody').value=f.body||'';
      document.getElementById('fMode').value=f.mode||'consent'; document.getElementById('fAudience').value=f.audience||'all';
      document.getElementById('fTarget').value=f.audience==='grade'?(f.target_grade||''):(f.target_classroom||'');
      document.getElementById('fDeadline').value=f.deadline||''; document.getElementById('fSig').checked=f.require_signature!==false;
      document.getElementById('fActive').checked=f.active!==false; toggleTarget(); document.getElementById('formModal').classList.add('show');
    }
    function closeForm(){ document.getElementById('formModal').classList.remove('show'); }

    async function saveForm(){
      const title=document.getElementById('fTitle').value.trim(); if(!title){ toast('ใส่หัวข้อ','error'); return; }
      const aud=document.getElementById('fAudience').value; const tgt=document.getElementById('fTarget').value.trim();
      const btn=document.getElementById('saveBtn'); btn.disabled=true; const old=btn.textContent; btn.textContent='⏳';
      const { data, error } = await supabaseClient.rpc('save_consent_form', {
        p_id: document.getElementById('fId').value||null, p_title:title, p_body:document.getElementById('fBody').value.trim()||null,
        p_audience:aud, p_grade: aud==='grade'?tgt:null, p_classroom: aud==='classroom'?tgt:null,
        p_mode:document.getElementById('fMode').value, p_require_sig:document.getElementById('fSig').checked,
        p_deadline:document.getElementById('fDeadline').value||null, p_active:document.getElementById('fActive').checked
      });
      btn.disabled=false; btn.textContent=old;
      if(error||!data||!data.success){ toast((data&&data.error)||'บันทึกไม่สำเร็จ','error'); return; }
      toast('บันทึกแล้ว','success'); closeForm(); load();
    }
    async function delForm(id){ if(!confirm('ลบหนังสือนี้? (ผลตอบกลับจะถูกลบด้วย)')) return;
      const { data } = await supabaseClient.rpc('delete_consent_form',{p_id:id}); if(data&&data.success){ toast('ลบแล้ว','success'); load(); } else toast('ลบไม่สำเร็จ','error'); }

    async function viewResp(id){
      document.getElementById('respModal').classList.add('show');
      document.getElementById('respBody').innerHTML='<div class="empty">⏳</div>';
      const { data, error } = await supabaseClient.rpc('get_consent_responses',{p_form_id:id});
      if(error){ document.getElementById('respBody').innerHTML='<div class="empty">'+esc(error.message)+'</div>'; return; }
      const rows=data||[]; const answered=rows.filter(r=>r.decision).length;
      document.getElementById('respBody').innerHTML =
        `<div style="font-size:13px;color:var(--pk-ash);margin-bottom:8px;">ตอบแล้ว ${answered}/${rows.length} คน</div>`
        + `<table class="resp"><thead><tr><th>นักเรียน</th><th>ชั้น</th><th>คำตอบ</th><th>ผู้เซ็น</th><th>เวลา</th></tr></thead><tbody>`
        + rows.map(r=>{ const d=DEC[r.decision]||['ยังไม่ตอบ','b-no'];
          return `<tr><td>${esc(r.student_name)}</td><td>${esc(r.grade||'')}${r.classroom?('/'+esc(r.classroom)):''}</td>
            <td><span class="badge ${d[1]}">${d[0]}</span></td><td>${esc(r.signer_name||'')}${r.relation?(' ('+esc(r.relation)+')'):''}</td>
            <td>${r.responded_at?new Date(r.responded_at).toLocaleDateString('th-TH'):''}</td></tr>`; }).join('')
        + '</tbody></table>';
    }

    let toastTimer=null;
    function toast(msg,type){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show '+(type||''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className='toast',2600); }
  </script>
</body>
</html>
