<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คู่มือการใช้งาน — PanyaSchoolKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../images/panya-mark.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --brand:#1E40AF;--pk-blue-900:#1E3A8A;--pk-blue-800:#1E40AF;--pk-blue-600:#2563EB;
      --pk-blue-50:#EEF3FF;--pk-canvas:#EBF0FA;--pk-paper:#FFFFFF;
      --pk-ink:#0F1A36;--pk-ink-soft:#1F2A4E;--pk-ash:#4B5670;--pk-mist:#7B8497;
      --pk-border:#D8DEE9;--pk-success:#065F46;--pk-success-bg:#D1FAE5;--pk-warn:#92400E;--pk-warn-bg:#FEF3C7;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:var(--pk-canvas);color:var(--pk-ink);line-height:1.7;}
    .topbar{background:var(--pk-paper);border-bottom:1px solid var(--pk-border);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50;flex-wrap:wrap;}
    .topbar-left{display:flex;align-items:center;gap:14px;}
    .topbar img{height:24px;}
    .back-link{color:var(--pk-ash);text-decoration:none;font-size:13.5px;padding:6px 12px;border-radius:8px;}
    .back-link:hover{background:var(--pk-canvas);}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .search{padding:8px 12px;border:1px solid var(--pk-border);border-radius:9px;font-family:inherit;font-size:14px;min-width:180px;}
    .lang-btn{border:1.5px solid var(--pk-border-em,#A8B2C4);background:#fff;color:var(--brand);font-family:inherit;font-weight:700;font-size:13px;padding:7px 14px;border-radius:100px;cursor:pointer;}

    .wrap{max-width:1000px;margin:0 auto;padding:22px;}
    .hero{background:linear-gradient(135deg,var(--brand),var(--pk-blue-900));color:#fff;border-radius:16px;padding:26px 30px;margin-bottom:18px;}
    .hero h1{font-size:23px;font-weight:800;margin-bottom:6px;}
    .hero p{font-size:14px;opacity:.9;}

    /* Role tabs */
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
    .tab{flex:1;min-width:130px;background:var(--pk-paper);border:1.5px solid var(--pk-border);border-radius:12px;padding:12px 14px;cursor:pointer;text-align:center;transition:all .15s;}
    .tab .ic{font-size:22px;}
    .tab .nm{font-size:14px;font-weight:700;margin-top:3px;color:var(--pk-ink);}
    .tab .ds{font-size:11px;color:var(--pk-mist);margin-top:2px;}
    .tab.active{border-color:var(--brand);background:var(--pk-blue-50);box-shadow:0 6px 18px -10px rgba(30,64,175,.4);}
    .tab.active .nm{color:var(--brand);}

    .sec{background:var(--pk-paper);border:1px solid var(--pk-border);border-radius:14px;padding:20px 24px;margin-bottom:14px;scroll-margin-top:80px;}
    .sec h2{font-size:18px;font-weight:700;color:var(--pk-blue-900);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
    .sec .lead{color:var(--pk-ash);font-size:13.5px;margin-bottom:12px;}
    .sec h3{font-size:14.5px;font-weight:700;color:var(--pk-ink);margin:14px 0 5px;}
    .sec p{font-size:14px;color:var(--pk-ink-soft);margin-bottom:7px;}
    .sec ol,.sec ul{margin:5px 0 11px 22px;font-size:14px;color:var(--pk-ink-soft);}
    .sec li{margin-bottom:5px;}
    .sec b{color:var(--pk-ink);}
    .sec code{background:var(--pk-blue-50);color:var(--brand);padding:1px 6px;border-radius:5px;font-size:13px;font-family:'Inter',monospace;}
    .tip{background:var(--pk-success-bg);border-left:3px solid var(--pk-success);border-radius:8px;padding:10px 14px;font-size:13.5px;color:var(--pk-success);margin:9px 0;}
    .warn{background:var(--pk-warn-bg);border-left:3px solid #F59E0B;border-radius:8px;padding:10px 14px;font-size:13.5px;color:var(--pk-warn);margin:9px 0;}
    .empty{text-align:center;padding:40px;color:var(--pk-mist);}
    .foot{text-align:center;color:var(--pk-mist);font-size:12px;padding:18px;}
    @media(max-width:560px){ .tab{min-width:0;flex-basis:calc(50% - 4px);} .wrap{padding:16px;} .search{min-width:120px;} }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <a href="../index.html"><img src="../images/panya-schoolkit-lockup.png" alt="Panya SchoolKit" onerror="this.style.display='none'" /></a>
      <a href="dashboard.html" class="back-link" id="backLink">← แดชบอร์ด</a>
    </div>
    <div class="topbar-right">
      <input class="search" id="search" placeholder="🔍 ค้นหา..." oninput="render()" />
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
    </div>
  </div>

  <div class="wrap">
    <div class="hero">
      <h1 id="heroTitle">📖 คู่มือการใช้งาน</h1>
      <p id="heroSub">เลือกบทบาทของคุณด้านล่าง — คู่มือจะแสดงเฉพาะสิ่งที่เกี่ยวกับคุณ</p>
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="content"></div>
    <div class="foot">PanyaSchoolKit · <span id="footLbl">คู่มือการใช้งาน</span> · 2026</div>
  </div>

  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script>
  // ---- language + UI strings ----
  var lang = (function(){ try{ return localStorage.getItem('pk_lang')||'th'; }catch(e){ return 'th'; } })();
  var UI = {
    heroTitle:{th:'📖 คู่มือการใช้งาน',en:'📖 User Guide'},
    heroSub:{th:'เลือกบทบาทของคุณด้านล่าง — คู่มือจะแสดงเฉพาะสิ่งที่เกี่ยวกับคุณ',en:'Pick your role below — the guide shows only what applies to you.'},
    back:{th:'← แดชบอร์ด',en:'← Dashboard'},
    search:{th:'🔍 ค้นหา...',en:'🔍 Search...'},
    foot:{th:'คู่มือการใช้งาน',en:'User Guide'},
    noResult:{th:'ไม่พบหัวข้อที่ค้นหา',en:'No matching topics'}
  };
  var TABS = [
    { id:'student', ic:'🎒', nm:{th:'นักเรียน / ผู้ปกครอง',en:'Student / Parent'}, ds:{th:'ดูเกรด ตาราง จ่ายค่าเทอม',en:'Grades, schedule, tuition'} },
    { id:'teacher', ic:'👩‍🏫', nm:{th:'ครู',en:'Teacher'}, ds:{th:'เช็คชื่อ เกรด การบ้าน',en:'Attendance, grades, homework'} },
    { id:'admin',   ic:'🛠️', nm:{th:'แอดมิน',en:'Admin'}, ds:{th:'จัดการทั้งเว็บ (ไม่รวมการเงิน)',en:'Manage all (except finance)'} },
    { id:'owner',   ic:'👑', nm:{th:'เจ้าของ / ผู้บริหาร',en:'Owner'}, ds:{th:'การเงิน ตั้งค่า ทุกอย่าง',en:'Finance, settings, everything'} }
  ];

  // ---- the guide content (role-tagged, bilingual). roles = which tabs show it ----
  var GUIDE = [
    { id:'login', roles:['student','teacher','admin','owner'], icon:'🔑',
      th:{ t:'เข้าสู่ระบบ & เปลี่ยนภาษา', b:`
        <ol><li>เปิดเว็บโรงเรียน เช่น <code>ชื่อโรงเรียน.panyaschoolkit.com</code> (หรือโดเมนของโรงเรียน)</li>
        <li>กรอกอีเมล + รหัสผ่านที่ได้รับ → กด <b>เข้าสู่ระบบ</b></li>
        <li>ระบบพาไปหน้าหลักตามสิทธิ์ของคุณ</li></ol>
        <p><b>เปลี่ยนภาษา:</b> กดปุ่ม <b>EN / ไทย</b> มุมขวาบนได้ทุกหน้า</p>
        <div class="tip">💡 ลืมรหัสผ่าน? กด "ลืมรหัสผ่าน" ที่หน้า login — ระบบส่งลิงก์รีเซ็ตไปอีเมล</div>` },
      en:{ t:'Login & change language', b:`
        <ol><li>Open your school site, e.g. <code>yourschool.panyaschoolkit.com</code> (or the school's domain)</li>
        <li>Enter the email + password you were given → tap <b>Sign In</b></li>
        <li>You land on the home screen for your role</li></ol>
        <p><b>Change language:</b> tap the <b>EN / ไทย</b> button at the top right of any page.</p>
        <div class="tip">💡 Forgot your password? Tap "Forgot password" on the login page — a reset link is emailed to you.</div>` } },

    // ===== STUDENT / PARENT =====
    { id:'s-home', roles:['student'], icon:'📊',
      th:{ t:'ดูข้อมูลของลูก/ของฉัน', b:`
        <ul><li><b>เกรด</b> — ดูเกรดแต่ละวิชา + GPA + ดาวน์โหลดใบรายงานผล (เมื่อครูเผยแพร่แล้ว)</li>
        <li><b>ตารางเรียน</b> — ตารางของห้อง + การ์ด "คาบถัดไป"</li>
        <li><b>การเข้าเรียน</b> — ประวัติ มา / ขาด / สาย / ลา</li>
        <li><b>การบ้าน</b> — งานที่ครูมอบหมาย + กำหนดส่ง</li></ul>` },
      en:{ t:'View your / your child\'s info', b:`
        <ul><li><b>Grades</b> — view each subject's grade + GPA + download the report card (once the teacher publishes)</li>
        <li><b>Schedule</b> — the class timetable + a "Next period" card</li>
        <li><b>Attendance</b> — present / absent / late / leave history</li>
        <li><b>Homework</b> — assignments and due dates</li></ul>` } },
    { id:'s-pay', roles:['student'], icon:'💳',
      th:{ t:'จ่ายค่าเทอม (PromptPay)', b:`
        <ol><li>ไปหน้า <b>บิล / ค่าเทอม</b> → กดบิลที่ต้องจ่าย</li>
        <li><b>สแกน QR</b> ด้วยแอปธนาคาร — ยอดเงินขึ้นอัตโนมัติ ไม่ต้องพิมพ์เอง</li>
        <li>โอนเงิน → <b>อัปโหลดสลิป</b> → รอโรงเรียนตรวจสอบ</li>
        <li>เมื่ออนุมัติ บิลจะเปลี่ยนเป็น "ชำระแล้ว"</li></ol>
        <div class="tip">💡 ดูได้ทั้งบิลค้างชำระและประวัติที่จ่ายแล้วในหน้าเดียว</div>` },
      en:{ t:'Pay tuition (PromptPay)', b:`
        <ol><li>Go to <b>Bills / Tuition</b> → tap the bill to pay</li>
        <li><b>Scan the QR</b> with your banking app — the amount fills in automatically</li>
        <li>Transfer → <b>upload the slip</b> → wait for the school to verify</li>
        <li>Once approved the bill turns to "Paid"</li></ol>
        <div class="tip">💡 Both outstanding bills and paid history are on the same page.</div>` } },
    { id:'s-msg', roles:['student'], icon:'💬',
      th:{ t:'คุยกับครู & เอกสาร', b:`
        <ul><li><b>ข้อความ</b> — แชทกับครูประจำชั้นได้โดยตรง</li>
        <li><b>ใบประกาศ / เกียรติบัตร</b> — ดาวน์โหลด + สแกน QR ตรวจสอบของจริงได้</li>
        <li><b>ปฏิทิน</b> — วันหยุด สอบ กิจกรรมของโรงเรียน</li></ul>` },
      en:{ t:'Message teachers & documents', b:`
        <ul><li><b>Messages</b> — chat directly with the homeroom teacher</li>
        <li><b>Certificates</b> — download + scan the QR to verify authenticity</li>
        <li><b>Calendar</b> — holidays, exams, and school events</li></ul>` } },

    // ===== TEACHER (also shown to admin + owner) =====
    { id:'t-attend', roles:['teacher','admin','owner'], icon:'✅',
      th:{ t:'เช็คชื่อ + แจ้ง LINE', b:`
        <ol><li>หน้า <b>เช็คชื่อ</b> → เลือกห้อง + วันที่</li>
        <li>กดสถานะของนักเรียนแต่ละคน: มา / ขาด / สาย / ลา / ป่วย</li>
        <li>ถ้าเชื่อม LINE ไว้ → ระบบส่งแจ้งผู้ปกครองอัตโนมัติเมื่อขาด/สาย</li></ol>
        <div class="warn">⚠️ LINE ส่งได้เมื่อ (1) โรงเรียนเชื่อม LINE OA แล้ว และ (2) ผู้ปกครอง add เพื่อน + ผูก LINE ID</div>` },
      en:{ t:'Take attendance + LINE alert', b:`
        <ol><li>Open <b>Attendance</b> → pick the class + date</li>
        <li>Tap each student's status: present / absent / late / leave / sick</li>
        <li>If LINE is connected, parents get an automatic alert on absent/late</li></ol>
        <div class="warn">⚠️ LINE works once (1) the school has connected a LINE OA and (2) the parent added it as a friend + linked their LINE ID.</div>` } },
    { id:'t-grades', roles:['teacher','admin','owner'], icon:'📝',
      th:{ t:'ใส่เกรด & ใบรายงานผล / ปพ.', b:`
        <ol><li>หน้า <b>เกรด</b> → เลือกปี + เทอม + ห้อง + วิชา → Load</li>
        <li>ใส่คะแนน (เก็บ/กลางภาค/ปลายภาค) → ระบบคำนวณเกรดอัตโนมัติ</li>
        <li>กด <b>บันทึก</b> (เป็นฉบับร่าง ผู้ปกครองยังไม่เห็น)</li>
        <li>กด <b>เผยแพร่ (Publish)</b> → ผู้ปกครอง/นักเรียนเห็นเกรด</li></ol>
        <p><b>เอกสาร ปพ.:</b> ปพ.1 (ระเบียนผลการเรียน), ปพ.5 (รายวิชาทั้งห้อง), ปพ.6 (รายงานรายบุคคล) ออกเป็น PDF ได้จากหน้าเกรด</p>` },
      en:{ t:'Enter grades & report cards', b:`
        <ol><li>Open <b>Grades</b> → pick year + term + class + subject → Load</li>
        <li>Enter scores (coursework/midterm/final) → grades compute automatically</li>
        <li>Tap <b>Save</b> (draft — parents don't see it yet)</li>
        <li>Tap <b>Publish</b> → parents/students can see grades</li></ol>
        <p><b>ปพ. documents:</b> ปพ.1 (transcript), ปพ.5 (whole-class subject record), ปพ.6 (individual progress report) export as PDF from the grades page.</p>` } },
    { id:'t-learn', roles:['teacher','admin','owner'], icon:'📚',
      th:{ t:'การบ้าน · พฤติกรรม · สื่อ · ข้อสอบ', b:`
        <ul><li><b>การบ้าน</b> — มอบหมายงานต่อห้อง + ตรวจ + ให้คะแนน</li>
        <li><b>คะแนนพฤติกรรม</b> — เริ่มที่ 100 บวก/ลบคะแนนได้ นักเรียนเห็นของตัวเอง</li>
        <li><b>สื่อการสอน</b> — แชร์ลิงก์ไฟล์/วิดีโอให้นักเรียนรายห้อง</li>
        <li><b>ข้อสอบออนไลน์</b> — สร้างข้อสอบ (เลือกตอบ/ถูกผิด/อัตนัย) ระบบตรวจให้อัตโนมัติ</li></ul>` },
      en:{ t:'Homework · Behavior · Materials · Quiz', b:`
        <ul><li><b>Homework</b> — assign per class + review + grade</li>
        <li><b>Behavior points</b> — start at 100, add/deduct; students see their own</li>
        <li><b>Learning materials</b> — share file/video links per class</li>
        <li><b>Online quiz</b> — build quizzes (MC/true-false/short answer), auto-graded</li></ul>` } },
    { id:'t-sched', roles:['teacher','admin','owner'], icon:'🗓️',
      th:{ t:'ตารางสอน & คุยกับผู้ปกครอง', b:`
        <ul><li><b>ตารางสอน</b> — ดูตารางของตัวเอง + ดาวน์โหลด PDF</li>
        <li><b>ข้อความ</b> — แชทกับผู้ปกครองรายนักเรียน</li></ul>` },
      en:{ t:'My timetable & parent chat', b:`
        <ul><li><b>My timetable</b> — view your own schedule + download PDF</li>
        <li><b>Messages</b> — chat with parents per student</li></ul>` } },

    // ===== ADMIN (also shown to owner) =====
    { id:'a-people', roles:['admin','owner'], icon:'🎓',
      th:{ t:'จัดการนักเรียน & ครู', b:`
        <ul><li><b>เพิ่มทีละคน:</b> หน้านักเรียน/ครู → กด ➕ → กรอก → บันทึก</li>
        <li><b>ฟิลด์เพิ่มเติม:</b> ตั้งฟิลด์เองได้ (เช่น เลขพาสปอร์ต กรุ๊ปเลือด) ที่ "ตั้งค่าฟิลด์"</li>
        <li><b>ดูรายละเอียด:</b> คลิกชื่อ → เห็นข้อมูลครบ + เกรด + การเข้าเรียน</li></ul>` },
      en:{ t:'Manage students & teachers', b:`
        <ul><li><b>Add one by one:</b> Students/Teachers page → tap ➕ → fill in → save</li>
        <li><b>Custom fields:</b> add your own fields (passport no., blood type…) under "Configure Fields"</li>
        <li><b>Details:</b> click a name → full info + grades + attendance</li></ul>` } },
    { id:'a-import', roles:['admin','owner'], icon:'📥',
      th:{ t:'นำเข้าจาก Excel', b:`
        <ol><li>หน้านักเรียน/ครู → กด <b>📥 Import Excel/CSV</b></li>
        <li>อัปโหลดไฟล์ Excel เดิม (.xlsx/.csv) ได้เลย ไม่ต้องแปลงก่อน</li>
        <li>ระบบ <b>จับคู่คอลัมน์อัตโนมัติ</b> (รองรับหัวคอลัมน์ไทย) — แก้ได้ถ้าไม่ตรง</li>
        <li>กดดูตัวอย่าง (แปลงเพศ/วันที่ พ.ศ.→ค.ศ. ให้) → กด <b>นำเข้า</b></li></ol>
        <div class="warn">⚠️ ฟิลด์จำเป็น: รหัส, ชื่อ, นามสกุล — แถวที่ขาดจะถูกข้ามและบอกเหตุผล (ไม่ทำให้ทั้งไฟล์ล้ม)</div>` },
      en:{ t:'Import from Excel', b:`
        <ol><li>Students/Teachers page → tap <b>📥 Import Excel/CSV</b></li>
        <li>Upload your existing Excel (.xlsx/.csv) directly — no conversion needed</li>
        <li>Columns are <b>auto-mapped</b> (Thai headers supported) — adjust if needed</li>
        <li>Preview (gender/Buddhist-year dates converted) → tap <b>Import</b></li></ol>
        <div class="warn">⚠️ Required: ID, first name, last name — rows missing these are skipped with a reason (the whole file won't fail).</div>` } },
    { id:'a-admissions', roles:['admin','owner'], icon:'📋',
      th:{ t:'รับสมัคร (Admissions)', b:`
        <ul><li>ผู้สมัครกรอกฟอร์มที่เว็บ public ของโรงเรียน → ใบสมัครเข้าหน้า <b>Applications</b></li>
        <li>ตรวจ → เปลี่ยนสถานะ (รอ/สัมภาษณ์/รับ/ปฏิเสธ)</li>
        <li>กด <b>รับเข้าเป็นนักเรียน</b> → ระบบสร้างนักเรียนให้อัตโนมัติ</li></ul>` },
      en:{ t:'Admissions', b:`
        <ul><li>Applicants fill the form on the school's public site → applications appear under <b>Applications</b></li>
        <li>Review → change status (pending/interview/accepted/rejected)</li>

  var activeTab = 'student';

  function L(o){ return (o && o[lang]) || (o && o.th) || ''; }

  function renderTabs(){
    document.getElementById('tabs').innerHTML = TABS.map(function(t){
      return '<div class="tab'+(t.id===activeTab?' active':'')+'" onclick="setTab(\''+t.id+'\')">'
        + '<div class="ic">'+t.ic+'</div><div class="nm">'+L(t.nm)+'</div><div class="ds">'+L(t.ds)+'</div></div>';
    }).join('');
  }
  function setTab(id){ activeTab=id; renderTabs(); render(); window.scrollTo({top:0,behavior:'smooth'}); }

  function render(){
    var q = (document.getElementById('search').value||'').trim().toLowerCase();
    var secs = GUIDE.filter(function(s){ return s.roles.indexOf(activeTab)>-1; });
    var html = secs.map(function(s){
      var c = s[lang]||s.th;
      var hay = (c.t+' '+c.b).toLowerCase();
      if(q && hay.indexOf(q)<0) return '';
      return '<section class="sec"><h2>'+s.icon+' '+c.t+'</h2>'+c.b+'</section>';
    }).join('');
    document.getElementById('content').innerHTML = html || '<div class="empty">'+L(UI.noResult)+'</div>';
  }

  function applyUI(){
    document.documentElement.lang = lang;
    document.getElementById('heroTitle').textContent = L(UI.heroTitle);
    document.getElementById('heroSub').textContent = L(UI.heroSub);
    document.getElementById('backLink').textContent = L(UI.back);
    document.getElementById('search').placeholder = L(UI.search);
    document.getElementById('footLbl').textContent = L(UI.foot);
    document.getElementById('langBtn').textContent = (lang==='th'?'EN':'ไทย');
    document.title = (lang==='th'?'คู่มือการใช้งาน':'User Guide')+' — PanyaSchoolKit';
  }
  function toggleLang(){ lang = (lang==='th'?'en':'th'); try{localStorage.setItem('pk_lang',lang);}catch(e){} applyUI(); renderTabs(); render(); }

  // auto-select the tab for the logged-in user's role
  (async function init(){
    applyUI(); renderTabs(); render();
    try{
      var role = null;
      if(window.auth && window.auth.getProfile){ var p = await window.auth.getProfile(); role = p && p.role; }
      var map = { student:'student', parent:'student', teacher:'teacher', staff:'admin', admin:'admin', owner:'owner', developer:'owner' };
      if(role && map[role]){ activeTab = map[role]; renderTabs(); render(); }
    }catch(e){}
  })();
  </script>
