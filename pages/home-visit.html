<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เยี่ยมบ้านนักเรียน — PanyaSchoolKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../images/panya-mark.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--pk-blue-800:#1E40AF;--pk-blue-50:#EEF3FF;--pk-canvas:#EBF0FA;--pk-paper:#FFFFFF;--pk-ink:#0F1A36;--pk-ink-soft:#1F2A4E;--pk-ash:#4B5670;--pk-border:#D8DEE9;--pk-border-em:#A8B2C4;--pk-success:#065F46;--pk-success-bg:#D1FAE5;--pk-danger:#991B1B;--pk-danger-bg:#FEE2E2;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:var(--pk-canvas);color:var(--pk-ink);min-height:100vh;}
    .topbar{background:var(--pk-paper);border-bottom:1px solid var(--pk-border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .topbar-left{display:flex;align-items:center;gap:16px;} .topbar img{height:26px;}
    .back-link{color:var(--pk-ash);text-decoration:none;font-size:13.5px;padding:6px 12px;border-radius:8px;}
    .container{max-width:820px;margin:0 auto;padding:24px;}
    .page-title h1{font-size:23px;font-weight:700;} .page-title p{color:var(--pk-ash);font-size:13.5px;margin-top:4px;margin-bottom:16px;}
    .card{background:var(--pk-paper);border:1px solid var(--pk-border);border-radius:14px;padding:18px 20px;margin-bottom:16px;}
    .btn{padding:9px 16px;border-radius:9px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border:none;}
    .btn-primary{background:var(--pk-blue-800);color:#fff;} .btn-secondary{background:#F0FDF4;color:#065F46;border:1px solid #BBF7D0;} .btn-danger{background:var(--pk-danger-bg);color:var(--pk-danger);} .btn-sm{padding:6px 12px;font-size:12px;}
    label.fl{display:block;font-size:12px;color:var(--pk-ash);font-weight:600;margin-bottom:4px;margin-top:10px;}
    input,select,textarea{padding:9px 12px;border:1px solid var(--pk-border);border-radius:8px;font-family:inherit;font-size:14px;width:100%;}
    .row{display:flex;gap:10px;flex-wrap:wrap;}
    .photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
    .photos .ph{position:relative;width:84px;height:84px;border-radius:9px;overflow:hidden;border:1px solid var(--pk-border);background-size:cover;background-position:center;}
    .photos .ph .x{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:0;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:13px;line-height:1;}
    .hcard{border:1px solid var(--pk-border);border-radius:12px;padding:13px 15px;margin-bottom:10px;}
    .hcard .meta{font-size:12.5px;color:var(--pk-ash);margin-bottom:6px;}
    .hcard .field{font-size:13px;margin-top:5px;} .hcard .field b{color:var(--pk-ink-soft);}
    .hcard .thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
    .hcard .thumbs a{width:64px;height:64px;border-radius:7px;background-size:cover;background-position:center;border:1px solid var(--pk-border);}
    .empty{color:var(--pk-ash);font-size:13px;padding:10px 0;}
    .toast{position:fixed;bottom:28px;right:28px;background:var(--pk-ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;z-index:200;}
    .toast.show{opacity:1;}.toast.success{background:var(--pk-success);}.toast.error{background:var(--pk-danger);}
    @media(max-width:640px){.container{padding:14px;}input,select,textarea{font-size:16px;}}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <a href="../index.html"><img src="../images/panya-schoolkit-lockup.png" alt="Panya SchoolKit" /></a>
      <a href="dashboard.html" class="back-link">← แดชบอร์ด</a>
    </div><div></div>
  </div>

  <div class="container">
    <div class="page-title">
      <h1>🏠 เยี่ยมบ้านนักเรียน</h1>
      <p>บันทึกการเยี่ยมบ้าน สภาพครอบครัว สิ่งที่พบ และการช่วยเหลือ · แนบรูปได้</p>
    </div>

    <div class="card">
      <div class="row">
        <div style="flex:2;min-width:200px;"><label class="fl" style="margin-top:0;">นักเรียน</label>
          <select id="student" onchange="loadHistory()"><option value="">— เลือกนักเรียน —</option></select>
        </div>
        <div style="flex:1;"><label class="fl" style="margin-top:0;">วันที่เยี่ยม</label><input type="date" id="vdate" /></div>
        <div style="flex:1;"><label class="fl" style="margin-top:0;">ผู้เยี่ยม</label><input id="visitor" placeholder="ชื่อครู" /></div>
      </div>

      <div class="row">
        <div style="flex:1;"><label class="fl">สภาพครอบครัว</label><textarea id="family" rows="2"></textarea></div>
        <div style="flex:1;"><label class="fl">สภาพแวดล้อม/ที่อยู่อาศัย</label><textarea id="env" rows="2"></textarea></div>
      </div>
      <label class="fl">สิ่งที่พบ</label><textarea id="findings" rows="2"></textarea>
      <div class="row">
        <div style="flex:1;"><label class="fl">ข้อเสนอแนะ/การช่วยเหลือ</label><textarea id="recos" rows="2"></textarea></div>
        <div style="flex:1;"><label class="fl">การติดตาม</label><textarea id="followup" rows="2"></textarea></div>
      </div>

      <label class="fl">รูปภาพ (บ้าน/ครอบครัว)</label>
      <button type="button" class="btn btn-secondary" id="photoBtn">📷 เพิ่มรูป</button>
      <input type="file" id="photoFile" accept="image/*" style="display:none;" />
      <span id="upStatus" style="font-size:12px;color:var(--pk-ash);margin-left:8px;"></span>
      <div class="photos" id="photos"></div>

      <div style="margin-top:16px;text-align:right;">
        <button class="btn btn-primary" id="saveBtn" onclick="saveVisit()">💾 บันทึกการเยี่ยม</button>
      </div>
    </div>

    <div class="card">
      <h2 style="font-size:15px;font-weight:700;margin-bottom:8px;">📋 ประวัติการเยี่ยมบ้าน</h2>
      <div id="hist"><div class="empty">เลือกนักเรียนเพื่อดูประวัติ</div></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/i18n.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/upload.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/role-guard.js"></script>
  <script>
    let photos = [];

    document.addEventListener('DOMContentLoaded', async () => {
      const prof = await roleGuard.requireTeacher();
      if (!prof) return;
      document.getElementById('vdate').valueAsDate = new Date();
      if (prof.first_name || prof.last_name) document.getElementById('visitor').value = ((prof.first_name||'')+' '+(prof.last_name||'')).trim();
      await loadStudents();
      bindPhoto();
    });
    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    async function loadStudents() {
      let all=[], from=0; const size=1000;
      while(true){ const { data, error } = await supabaseClient.from('students').select('id,first_name_th,last_name_th,grade,classroom,status').range(from,from+size-1);
        if(error) break; all=all.concat(data||[]); if(!data||data.length<size) break; from+=size; if(from>20000) break; }
      all = all.filter(s=>!s.status||s.status==='active').sort((a,b)=>((a.grade||'')+(a.classroom||'')).localeCompare((b.grade||'')+(b.classroom||''),'th',{numeric:true}));
      document.getElementById('student').insertAdjacentHTML('beforeend', all.map(s=>
        `<option value="${s.id}">${esc((s.first_name_th||'')+' '+(s.last_name_th||''))} · ${esc(s.grade||'')}${s.classroom?('/'+esc(s.classroom)):''}</option>`).join(''));
    }

    function bindPhoto() {
      if (!window.skUpload) return;
      const st = document.getElementById('upStatus');
      skUpload.attachPicker({
        button: document.getElementById('photoBtn'),
        fileInput: document.getElementById('photoFile'),
        subfolder: 'home-visits',
        onStart: () => { st.textContent = '⏳ กำลังอัปโหลด...'; },
        onDone: (url) => { photos.push(url); st.textContent = '✅ เพิ่มรูปแล้ว'; renderPhotos(); },
        onError: (m) => { st.textContent = '❌ ' + m; }
      });
    }
    function renderPhotos() {
      document.getElementById('photos').innerHTML = photos.map((u,i) =>
        `<div class="ph" style="background-image:url('${esc(u)}')"><button class="x" onclick="rmPhoto(${i})">×</button></div>`).join('');
    }
    function rmPhoto(i){ photos.splice(i,1); renderPhotos(); }

    async function saveVisit() {
      const sid = document.getElementById('student').value;
      if (!sid) { toast('เลือกนักเรียนก่อน','error'); return; }
      const btn=document.getElementById('saveBtn'); btn.disabled=true; const old=btn.textContent; btn.textContent='⏳';
      const { data, error } = await supabaseClient.rpc('save_home_visit', {
        p_id:null, p_student_id:sid, p_visit_date:document.getElementById('vdate').value||null,
        p_visitor_name:document.getElementById('visitor').value.trim()||null,
        p_family_status:document.getElementById('family').value.trim()||null,
        p_environment:document.getElementById('env').value.trim()||null,
        p_findings:document.getElementById('findings').value.trim()||null,
        p_recommendations:document.getElementById('recos').value.trim()||null,
        p_followup:document.getElementById('followup').value.trim()||null,
        p_photo_urls:photos, p_year:null
      });
      btn.disabled=false; btn.textContent=old;
      if (error || !data || !data.success) { toast((data&&data.error)||(error&&error.message)||'บันทึกไม่สำเร็จ','error'); return; }
      toast('บันทึกการเยี่ยมบ้านแล้ว','success');
      ['family','env','findings','recos','followup'].forEach(id=>document.getElementById(id).value='');
      photos=[]; renderPhotos(); document.getElementById('upStatus').textContent='';
      loadHistory();
    }

    async function loadHistory() {
      const sid = document.getElementById('student').value;
      const box = document.getElementById('hist');
      if (!sid) { box.innerHTML='<div class="empty">เลือกนักเรียนเพื่อดูประวัติ</div>'; return; }
      const { data, error } = await supabaseClient.rpc('get_home_visits', { p_student_id: sid });
      if (error) { box.innerHTML='<div class="empty">'+esc(error.message)+'</div>'; return; }
      if (!data || !data.length) { box.innerHTML='<div class="empty">ยังไม่เคยเยี่ยมบ้าน</div>'; return; }
      box.innerHTML = data.map(r => {
        const ph = Array.isArray(r.photo_urls)?r.photo_urls:[];
        return `<div class="hcard">
          <div class="meta">📅 ${new Date(r.visit_date).toLocaleDateString('th-TH')} ${r.visitor_name?('· โดย '+esc(r.visitor_name)):''}
            <button class="btn btn-danger btn-sm" style="float:right" onclick="delVisit('${r.id}')">ลบ</button></div>
          ${r.family_status?`<div class="field"><b>ครอบครัว:</b> ${esc(r.family_status)}</div>`:''}
          ${r.environment?`<div class="field"><b>สภาพแวดล้อม:</b> ${esc(r.environment)}</div>`:''}
          ${r.findings?`<div class="field"><b>สิ่งที่พบ:</b> ${esc(r.findings)}</div>`:''}
          ${r.recommendations?`<div class="field"><b>การช่วยเหลือ:</b> ${esc(r.recommendations)}</div>`:''}
          ${r.followup?`<div class="field"><b>ติดตาม:</b> ${esc(r.followup)}</div>`:''}
          ${ph.length?`<div class="thumbs">${ph.map(u=>`<a href="${esc(u)}" target="_blank" class="" style="background-image:url('${esc(u)}')"></a>`).join('')}</div>`:''}
        </div>`;
      }).join('');
    }
    async function delVisit(id){
      if(!confirm('ลบบันทึกการเยี่ยมนี้?')) return;
      const { data } = await supabaseClient.rpc('delete_home_visit', { p_id:id });
      if(data&&data.success){ toast('ลบแล้ว','success'); loadHistory(); } else toast('ลบไม่สำเร็จ','error');
    }

    let toastTimer=null;
    function toast(msg,type){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show '+(type||''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className='toast',2600); }
  </script>
</body>
</html>
