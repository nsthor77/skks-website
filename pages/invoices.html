<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoices — PanyaSchoolKit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="icon" type="image/png" href="../images/logo.png" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Sprint 7.C: PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body { font-family: 'Sarabun', 'Prompt', sans-serif; background: #F8FAFC; }

    .wrap { max-width: 960px; margin: 32px auto; padding: 0 16px; }
    .page-header { margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
    .page-header h1 { font-size: 26px; font-weight: 700; margin: 0; color: #111; }
    .back-link {
      color: #2563EB;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .back-link:hover { text-decoration: underline; }

    .card {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 14px;
      border-radius: 20px;
      background: #F3F4F6;
      color: #374151;
      border: 1px solid #E5E7EB;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .filter-btn:hover { background: #E5E7EB; }
    .filter-btn.active {
      background: #1F2937;
      color: #fff;
      border-color: #1F2937;
    }
    .filter-count {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 7px;
      background: rgba(0,0,0,.1);
      border-radius: 10px;
      font-size: 11px;
    }
    .filter-btn.active .filter-count { background: rgba(255,255,255,.2); }

    .invoice-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .invoice-table th {
      text-align: left;
      padding: 12px;
      background: #F9FAFB;
      color: #6B7280;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid #E5E7EB;
    }
    .invoice-table td {
      padding: 14px 12px;
      border-bottom: 1px solid #F3F4F6;
      color: #111;
    }
    .invoice-table tbody tr:hover { background: #F9FAFB; }

    .status-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-paid { background: #D1FAE5; color: #065F46; }
    .status-failed { background: #FEE2E2; color: #991B1B; }
    .status-pending { background: #FEF3C7; color: #92400E; }
    .status-refunded { background: #E0E7FF; color: #3730A3; }

    .btn-small {
      padding: 5px 10px;
      font-size: 12px;
      background: #F3F4F6;
      border: 1px solid #E5E7EB;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      color: #374151;
      text-decoration: none;
    }
    .btn-small:hover { background: #E5E7EB; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9CA3AF;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    .loading { text-align: center; padding: 60px; color: #9CA3AF; }

    .summary-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 720px) { .summary-bar { grid-template-columns: 1fr 1fr; } }
    .summary-tile {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      padding: 16px;
    }
    .summary-tile .label {
      font-size: 11px;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 4px;
    }
    .summary-tile .value {
      font-size: 22px;
      font-weight: 700;
      color: #111;
    }

    /* Detail modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      max-width: 540px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal h3 { margin: 0 0 16px; font-size: 18px; }
    .modal-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #F3F4F6;
      font-size: 14px;
    }
    .modal-row .label { color: #6B7280; }
    .modal-row .value { color: #111; font-weight: 500; }
    .modal-close {
      float: right;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #6B7280;
    }

    /* ===== Sprint 7.C: Invoice PDF Template =====
       Always rendered with full dimensions; just moved off-screen via transform.
       This way html2canvas can always capture it properly. */
    .pdf-template {
      position: absolute;
      top: 0;
      left: 0;
      width: 794px;
      padding: 48px;
      background: #fff;
      font-family: 'Sarabun', sans-serif;
      color: #111;
      box-sizing: border-box;
      transform: translateX(-200vw); /* off-screen but still rendered */
      z-index: -1;
      pointer-events: none;
    }
    .pdf-template.rendering {
      transform: translateX(0);
      z-index: 99999;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }
    .pdf-template * { box-sizing: border-box; }

    .pdf-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      padding-bottom: 24px;
      border-bottom: 3px solid #2563EB;
      margin-bottom: 32px;
    }
    .pdf-brand h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1F2937;
      margin: 0 0 6px;
    }
    .pdf-brand p {
      font-size: 12px;
      color: #6B7280;
      margin: 2px 0;
      line-height: 1.5;
    }
    .pdf-doc-title {
      text-align: right;
    }
    .pdf-doc-title h2 {
      font-size: 26px;
      font-weight: 700;
      color: #2563EB;
      margin: 0 0 8px;
      letter-spacing: 1px;
    }
    .pdf-doc-title .invoice-num {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #374151;
      margin: 2px 0;
    }
    .pdf-doc-title .pdf-date {
      font-size: 12px;
      color: #6B7280;
      margin: 4px 0;
    }
    .pdf-doc-title .pdf-status {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 12px;
      background: #D1FAE5;
      color: #065F46;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .pdf-status.failed { background: #FEE2E2; color: #991B1B; }

    .pdf-billto {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    .pdf-billto-block {
      background: #F9FAFB;
      padding: 16px 20px;
      border-left: 3px solid #E5E7EB;
    }
    .pdf-billto-block .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6B7280;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .pdf-billto-block .name {
      font-size: 14px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }
    .pdf-billto-block .detail {
      font-size: 11px;
      color: #4B5563;
      margin: 2px 0;
      line-height: 1.5;
    }

    .pdf-items {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }
    .pdf-items th {
      text-align: left;
      padding: 10px 12px;
      background: #1F2937;
      color: #fff;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }
    .pdf-items th.right { text-align: right; }
    .pdf-items th.center { text-align: center; }
    .pdf-items td {
      padding: 14px 12px;
      border-bottom: 1px solid #E5E7EB;
      font-size: 13px;
      color: #111;
    }
    .pdf-items td.right { text-align: right; }
    .pdf-items td.center { text-align: center; }
    .pdf-items .description { font-weight: 500; }
    .pdf-items .description-sub {
      font-size: 11px;
      color: #6B7280;
      margin-top: 2px;
    }

    .pdf-totals {
      width: 100%;
      max-width: 320px;
      margin-left: auto;
      margin-bottom: 32px;
    }
    .pdf-totals .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 13px;
    }
    .pdf-totals .row.subtotal { color: #4B5563; }
    .pdf-totals .row.grand {
      border-top: 2px solid #1F2937;
      margin-top: 4px;
      padding-top: 12px;
      font-size: 18px;
      font-weight: 800;
      color: #1F2937;
    }

    .pdf-paymentinfo {
      background: #EFF6FF;
      border-left: 3px solid #2563EB;
      padding: 12px 16px;
      margin-bottom: 32px;
      font-size: 12px;
      color: #1E40AF;
    }
    .pdf-paymentinfo .label {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .pdf-paymentinfo .val {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #1E3A8A;
    }

    .pdf-footer {
      border-top: 1px solid #E5E7EB;
      padding-top: 16px;
      font-size: 10px;
      color: #9CA3AF;
      text-align: center;
      line-height: 1.6;
    }
    .pdf-footer strong { color: #4B5563; }
  </style>
</head>
<body>

  <div class="admin-topbar">
    <div class="admin-topbar-left">
      <a href="../index.html" class="admin-logo">
        <img src="../images/logo.png" alt="SchoolKit" />
        <h1>PanyaSchoolKit</h1>
      </a>
      <nav class="admin-nav">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="billing.html">💳 Billing</a>
        <a href="invoices.html" class="active">🧾 Invoices</a>
      </nav>
    </div>
    <div class="admin-topbar-right">
      <div class="user-chip">
        <span id="userName">Loading...</span>
        <div class="avatar" id="userAvatar">?</div>
      </div>
      <button class="btn-logout" onclick="auth.logout()">Sign Out</button>
    </div>
  </div>

  <div class="wrap">

    <div class="page-header">
      <h1>🧾 Invoice History</h1>
      <a href="billing.html" class="back-link">← กลับไปหน้า Billing</a>
    </div>

    <!-- Summary tiles -->
    <div class="summary-bar" id="summaryBar">
      <div class="summary-tile"><div class="label">รวมทั้งหมด</div><div class="value" id="totalInvoices">—</div></div>
      <div class="summary-tile"><div class="label">ชำระแล้ว</div><div class="value" id="paidCount">—</div></div>
      <div class="summary-tile"><div class="label">ล้มเหลว</div><div class="value" id="failedCount">—</div></div>
      <div class="summary-tile"><div class="label">ยอดรวมที่จ่าย</div><div class="value" id="totalPaid">฿0</div></div>
    </div>

    <div class="card">

      <div class="filters">
        <button class="filter-btn active" data-status="all" onclick="setFilter('all')">ทั้งหมด <span class="filter-count" id="count-all">0</span></button>
        <button class="filter-btn" data-status="paid" onclick="setFilter('paid')">ชำระแล้ว <span class="filter-count" id="count-paid">0</span></button>
        <button class="filter-btn" data-status="failed" onclick="setFilter('failed')">ล้มเหลว <span class="filter-count" id="count-failed">0</span></button>
        <button class="filter-btn" data-status="pending" onclick="setFilter('pending')">รอชำระ <span class="filter-count" id="count-pending">0</span></button>
      </div>

      <div id="invoicesList">
        <div class="loading">กำลังโหลด...</div>
      </div>

    </div>

  </div>

  <!-- Invoice detail modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- ===== Sprint 7.C: Hidden PDF Template ===== -->
  <div id="pdfTemplate" class="pdf-template"></div>

  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/role-guard.js"></script>

  <script>
  let allInvoices = [];
  let currentFilter = 'all';

  document.addEventListener('DOMContentLoaded', async () => {
    const profile = await roleGuard.requireRole(['owner', 'developer']);
    if (!profile) return;

    document.getElementById('userName').textContent = `${profile.first_name || ''} ${profile.last_name || ''}`.trim() || profile.email;
    document.getElementById('userAvatar').textContent = (profile.first_name || profile.email || '?')[0].toUpperCase();

    if (window.CURRENT_SCHOOL_ID) {
      loadInvoices();
    } else {
      window.addEventListener('tenant-resolved', loadInvoices, { once: true });
    }
  });

  async function loadInvoices() {
    const schoolId = window.CURRENT_SCHOOL_ID;
    if (!schoolId) return;

    const { data, error } = await supabaseClient
      .from('invoices')
      .select('*')
      .eq('school_id', schoolId)
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('invoicesList').innerHTML = `<p style="color:#DC2626;">โหลดไม่สำเร็จ: ${error.message}</p>`;
      return;
    }

    allInvoices = data || [];
    updateSummary();
    updateFilterCounts();
    render();
  }

  function setFilter(status) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-status="${status}"]`).classList.add('active');
    render();
  }

  function updateSummary() {
    const total = allInvoices.length;
    const paid = allInvoices.filter(i => i.status === 'paid');
    const failed = allInvoices.filter(i => i.status === 'failed');
    const totalPaid = paid.reduce((sum, i) => sum + (i.total_amount || i.amount || 0), 0);

    document.getElementById('totalInvoices').textContent = total;
    document.getElementById('paidCount').textContent = paid.length;
    document.getElementById('failedCount').textContent = failed.length;
    document.getElementById('totalPaid').textContent = `฿${totalPaid.toLocaleString()}`;
  }

  function updateFilterCounts() {
    document.getElementById('count-all').textContent = allInvoices.length;
    document.getElementById('count-paid').textContent = allInvoices.filter(i => i.status === 'paid').length;
    document.getElementById('count-failed').textContent = allInvoices.filter(i => i.status === 'failed').length;
    document.getElementById('count-pending').textContent = allInvoices.filter(i => i.status === 'pending').length;
  }

  function render() {
    const list = document.getElementById('invoicesList');
    const filtered = currentFilter === 'all'
      ? allInvoices
      : allInvoices.filter(i => i.status === currentFilter);

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="icon">📭</div>
          <p>ไม่มี invoice ในหมวดนี้</p>
        </div>
      `;
      return;
    }

    list.innerHTML = `
      <table class="invoice-table">
        <thead>
          <tr>
            <th>วันที่</th>
            <th>เลขที่ Invoice</th>
            <th>รายการ</th>
            <th>จำนวนเงิน</th>
            <th>สถานะ</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map(inv => {
            const date = new Date(inv.created_at).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
            const items = inv.line_items;
            const desc = (Array.isArray(items) && items.length > 0) ? items[0].description : '—';
            const amount = inv.total_amount || inv.amount || 0;
            return `
              <tr>
                <td>${date}</td>
                <td><code style="font-size:12px;">${inv.invoice_number}</code></td>
                <td style="color:#6B7280;font-size:13px;">${desc}</td>
                <td><strong>฿${amount.toLocaleString()}</strong></td>
                <td><span class="status-pill status-${inv.status}">${statusLabel(inv.status)}</span></td>
                <td><button class="btn-small" onclick='showDetail(${JSON.stringify(inv).replace(/'/g, "\\'")})'>ดูรายละเอียด</button></td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;
  }

  function statusLabel(s) {
    return { paid: 'ชำระแล้ว', failed: 'ล้มเหลว', pending: 'รอชำระ', refunded: 'คืนเงิน' }[s] || s;
  }

  function showDetail(inv) {
    const items = inv.line_items || [];
    const itemRows = items.map(it => `
      <div class="modal-row">
        <span class="label">${it.description}</span>
        <span class="value">฿${(it.amount || 0).toLocaleString()} × ${it.quantity || 1}</span>
      </div>
    `).join('');

    document.getElementById('modalContent').innerHTML = `
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>🧾 Invoice ${inv.invoice_number}</h3>

      <div class="modal-row">
        <span class="label">วันที่ออก</span>
        <span class="value">${new Date(inv.created_at).toLocaleString('th-TH')}</span>
      </div>
      <div class="modal-row">
        <span class="label">วันที่ชำระ</span>
        <span class="value">${inv.paid_at ? new Date(inv.paid_at).toLocaleString('th-TH') : '—'}</span>
      </div>
      <div class="modal-row">
        <span class="label">สถานะ</span>
        <span class="value"><span class="status-pill status-${inv.status}">${statusLabel(inv.status)}</span></span>
      </div>
      <div class="modal-row">
        <span class="label">Omise Charge ID</span>
        <span class="value"><code style="font-size:11px;">${inv.omise_charge_id || '—'}</code></span>
      </div>

      <h4 style="margin:20px 0 8px;font-size:14px;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;">รายการ</h4>
      ${itemRows || '<p style="color:#9CA3AF;font-size:13px;">ไม่มีรายการ</p>'}

      <div class="modal-row" style="border-top:2px solid #111;margin-top:12px;padding-top:14px;">
        <span class="label" style="color:#111;font-weight:600;">ยอดรวม</span>
        <span class="value" style="font-size:18px;font-weight:700;">฿${(inv.total_amount || inv.amount || 0).toLocaleString()}</span>
      </div>

      ${inv.status === 'paid' ? `
        <button class="btn-small" style="margin-top:16px;padding:10px 18px;background:#2563EB;color:#fff;border-color:#2563EB;font-weight:600;" onclick='downloadInvoicePDF(${JSON.stringify(inv).replace(/'/g, "\\'")})'>📄 Download Receipt PDF</button>
      ` : ''}
    `;
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
  }

  // ====================================================================
  // Sprint 7.C: Generate Invoice PDF Receipt
  // ====================================================================
  async function downloadInvoicePDF(inv) {
    if (!inv || !inv.id) return;
    const btn = event?.target;
    const originalText = btn?.textContent;
    if (btn) { btn.disabled = true; btn.textContent = '⏳ กำลังสร้าง PDF...'; }

    try {
      // Load school + billing_info for receipt header
      const schoolId = window.CURRENT_SCHOOL_ID;
      const { data: school } = await supabaseClient
        .from('schools')
        .select('id, name, name_en, contact_email, custom_domain, billing_info')
        .eq('id', schoolId)
        .single();

      const billing = school?.billing_info || {};
      const issueDate = new Date(inv.created_at).toLocaleDateString('th-TH', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
      const paidDate = inv.paid_at ? new Date(inv.paid_at).toLocaleDateString('th-TH', {
        year: 'numeric', month: 'long', day: 'numeric'
      }) : '—';

      const items = inv.line_items || [];
      const itemRows = items.map(it => `
        <tr>
          <td>
            <div class="description">${it.description || '—'}</div>
          </td>
          <td class="center">${it.quantity || 1}</td>
          <td class="right">฿${(it.amount || 0).toLocaleString()}</td>
          <td class="right">฿${((it.amount || 0) * (it.quantity || 1)).toLocaleString()}</td>
        </tr>
      `).join('');

      const subtotal = items.reduce((sum, it) => sum + ((it.amount || 0) * (it.quantity || 1)), 0);
      const total = inv.total_amount || inv.amount || subtotal;

      // Build the PDF HTML
      const tpl = document.getElementById('pdfTemplate');
      tpl.innerHTML = `
        <div class="pdf-header">
          <div class="pdf-brand">
            <h1>PanyaSchoolKit</h1>
            <p><strong>บริษัท ปัญญา เวนเจอร์ส จำกัด</strong></p>
            <p>Panya Ventures Co., Ltd.</p>
            <p>เลขประจำตัวผู้เสียภาษี: <strong>0405569004587</strong></p>
            <p>panyaschoolkit.com · support@panyaschoolkit.com</p>
          </div>
          <div class="pdf-doc-title">
            <h2>ใบเสร็จรับเงิน</h2>
            <p style="margin:2px 0;font-size:12px;color:#6B7280;">RECEIPT</p>
            <p class="invoice-num">${inv.invoice_number}</p>
            <p class="pdf-date">วันที่ออก: ${issueDate}</p>
            <span class="pdf-status ${inv.status === 'paid' ? '' : 'failed'}">
              ${inv.status === 'paid' ? 'ชำระแล้ว' : inv.status.toUpperCase()}
            </span>
          </div>
        </div>

        <div class="pdf-billto">
          <div class="pdf-billto-block">
            <div class="label">ผู้ออกใบเสร็จ (From)</div>
            <div class="name">บริษัท ปัญญา เวนเจอร์ส จำกัด</div>
            <div class="detail">Panya Ventures Co., Ltd.</div>
            <div class="detail">เลขผู้เสียภาษี: 0405569004587</div>
            <div class="detail">458/31 ถนนกลางเมือง ตำบลในเมือง</div>
            <div class="detail">อำเภอเมืองขอนแก่น จังหวัดขอนแก่น</div>
            <div class="detail">support@panyaschoolkit.com</div>
          </div>
          <div class="pdf-billto-block">
            <div class="label">ผู้รับใบเสร็จ (Bill to)</div>
            <div class="name">${billing.legal_name || school?.name || '—'}</div>
            ${billing.tax_id ? `<div class="detail">เลขผู้เสียภาษี: ${billing.tax_id}</div>` : ''}
            ${billing.billing_address ? `<div class="detail">${billing.billing_address}</div>` : ''}
            <div class="detail">${school?.contact_email || ''}</div>
          </div>
        </div>

        <table class="pdf-items">
          <thead>
            <tr>
              <th>รายการ (Description)</th>
              <th class="center">จำนวน</th>
              <th class="right">ราคา/หน่วย</th>
              <th class="right">รวม (บาท)</th>
            </tr>
          </thead>
          <tbody>
            ${itemRows || `<tr><td colspan="4" style="text-align:center;color:#9CA3AF;">ไม่มีรายการ</td></tr>`}
          </tbody>
        </table>

        <div class="pdf-totals">
          <div class="row subtotal">
            <span>ยอดรวม (Subtotal)</span>
            <span>฿${subtotal.toLocaleString()}</span>
          </div>
          <div class="row subtotal">
            <span>ภาษีมูลค่าเพิ่ม (VAT 0%)</span>
            <span>฿0</span>
          </div>
          <div class="row grand">
            <span>ยอดสุทธิ (Total)</span>
            <span>฿${total.toLocaleString()}</span>
          </div>
        </div>

        ${inv.status === 'paid' && inv.omise_charge_id ? `
          <div class="pdf-paymentinfo">
            <div class="label">ข้อมูลการชำระเงิน (Payment Information)</div>
            <div>วันที่ชำระ: ${paidDate}</div>
            <div>ช่องทาง: บัตรเครดิต/เดบิต (ผ่าน Omise)</div>
            <div class="val">Charge ID: ${inv.omise_charge_id}</div>
          </div>
        ` : ''}

        <div class="pdf-footer">
          <p><strong>หมายเหตุ:</strong> ใบเสร็จรับเงินนี้ออกในนามของ บริษัท ปัญญา เวนเจอร์ส จำกัด</p>
          <p>เอกสารฉบับนี้ใช้แทนใบเสร็จรับเงินอย่างเป็นทางการ — เก็บไว้เพื่อการตรวจสอบบัญชี</p>
          <p style="margin-top:8px;">หากมีข้อสงสัย ติดต่อ <strong>support@panyaschoolkit.com</strong></p>
        </div>
      `;

      // Generate PDF
      const filename = `${inv.invoice_number}.pdf`;
      const options = {
        margin: 0,
        filename: filename,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          letterRendering: true,
          backgroundColor: '#ffffff',
          logging: false,
          windowWidth: 794,
          windowHeight: 1123
        },
        jsPDF: {
          unit: 'px',
          format: [794, 1123], // A4 size at 96dpi
          orientation: 'portrait',
          hotfixes: ['px_scaling']
        }
      };

      // Move template into viewport using inline styles (avoid class clash with html2pdf clone)
      const originalStyle = tpl.getAttribute('style') || '';
      tpl.setAttribute('style', `
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 794px !important;
        padding: 48px !important;
        background: #ffffff !important;
        font-family: 'Sarabun', sans-serif !important;
        color: #111111 !important;
        z-index: 999999 !important;
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
        transform: none !important;
        box-sizing: border-box !important;
        box-shadow: 0 8px 40px rgba(0,0,0,0.2) !important;
      `);

      // Wait for Sarabun font to load (important for Thai)
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
      // Wait for layout + image rendering
      await new Promise(resolve => setTimeout(resolve, 800));

      try {
        await html2pdf().set(options).from(tpl).save();
      } finally {
        // Always restore template style
        tpl.setAttribute('style', originalStyle);
      }

      if (btn) {
        btn.disabled = false;
        btn.textContent = '✅ ดาวน์โหลดแล้ว';
        setTimeout(() => { if (btn) btn.textContent = originalText; }, 2000);
      }

    } catch (err) {
      console.error('[downloadInvoicePDF]', err);
      alert('ดาวน์โหลด PDF ไม่สำเร็จ: ' + (err.message || 'unknown'));
      if (btn) { btn.disabled = false; btn.textContent = originalText; }
    }
  }
  </script>

</body>
</html>
