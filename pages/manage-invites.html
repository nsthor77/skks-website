<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Invites — SKKS</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/png" href="../images/logo.png" />
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #F0F9FF 0%, #F0FDF4 100%);
      min-height: 100vh;
      font-family: 'Prompt', 'Sarabun', sans-serif;
    }
    
    .topbar {
      background: white;
      padding: 14px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-left img { height: 36px; }
    .topbar-left h1 { font: 600 16px 'Poppins'; color: #1E3A5F; margin: 0; }
    
    .topbar-right { display: flex; gap: 10px; align-items: center; }
    
    .btn-back, .btn-logout {
      padding: 7px 14px;
      border: none;
      border-radius: 100px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
    }
    
    .btn-back { background: #DBEAFE; color: #1E40AF; }
    .btn-logout { background: #FEE2E2; color: #991B1B; }
    
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
    }
    
    .page-header { margin-bottom: 24px; }
    .page-header h2 {
      font: 800 28px 'Poppins';
      color: #1E3A5F;
      margin: 0 0 6px 0;
    }
    .page-header p { color: #6B7280; margin: 0; font-size: 14px; }
    
    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(30, 58, 95, 0.06);
    }
    
    .card h3 {
      font: 600 16px 'Poppins';
      color: #1E3A5F;
      margin: 0 0 16px 0;
      padding-bottom: 12px;
      border-bottom: 2px solid #F3F4F6;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #E5E7EB;
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
    }
    
    .form-group input:focus, .form-group select:focus {
      border-color: #5BB8E0;
    }
    
    .btn-primary {
      padding: 11px 22px;
      background: linear-gradient(135deg, #7CB342, #5BB8E0);
      color: white;
      border: none;
      border-radius: 100px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(124, 179, 66, 0.3);
    }
    
    .code-result {
      margin-top: 16px;
      padding: 18px;
      background: linear-gradient(135deg, #ECFDF5, #DBEAFE);
      border-radius: 14px;
      border: 2px dashed #7CB342;
      display: none;
    }
    
    .code-result.show { display: block; }
    
    .code-result .code {
      font: 700 24px 'Poppins', monospace;
      color: #166534;
      letter-spacing: 3px;
      text-align: center;
      padding: 10px;
      background: white;
      border-radius: 10px;
      margin: 12px 0;
      user-select: all;
    }
    
    .code-result .meta {
      font-size: 12px;
      color: #4B5563;
      text-align: center;
    }
    
    .code-result .copy-btn {
      display: block;
      margin: 10px auto 0;
      padding: 8px 16px;
      background: #1E3A5F;
      color: white;
      border: none;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      text-align: left;
      padding: 10px;
      background: #F9FAFB;
      font-size: 11px;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    
    td {
      padding: 10px;
      border-top: 1px solid #F3F4F6;
      font-size: 13px;
    }
    
    .code-cell {
      font-family: 'Poppins', monospace;
      font-weight: 600;
      color: #1E3A5F;
    }
    
    .pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .pill.role-staff { background: #DCFCE7; color: #166534; }
    .pill.role-owner { background: #FCE7F3; color: #9F1239; }
    .pill.role-student { background: #DBEAFE; color: #1E40AF; }
    .pill.role-parent { background: #FEF3C7; color: #92400E; }
    
    .pill.status-active { background: #DCFCE7; color: #166534; }
    .pill.status-used { background: #E5E7EB; color: #4B5563; }
    .pill.status-expired { background: #FEE2E2; color: #991B1B; }
    
    .loading {
      text-align: center;
      padding: 30px;
      color: #6B7280;
    }
    
    .empty {
      text-align: center;
      padding: 40px;
      color: #9CA3AF;
    }
    
    .alert {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
    
    .alert.show { display: block; }
    .alert.error { background: #FEE2E2; color: #991B1B; }
    .alert.success { background: #DCFCE7; color: #166534; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <img src="../images/logo.png" alt="SKKS" />
      <h1>Manage Invite Codes</h1>
    </div>
    <div class="topbar-right">
      <a href="dashboard.html" class="btn-back">← Dashboard</a>
      <button class="btn-logout" onclick="auth.logout()">Sign Out</button>
    </div>
  </div>
  
  <div class="container">
    <div class="loading" id="loadingMsg">⏳ Checking access...</div>
    
    <div id="content" style="display:none;">
      <div class="page-header">
        <h2>🎟️ Invite Codes</h2>
        <p>Generate one-time codes to invite staff and admins</p>
      </div>
      
      <div class="alert" id="alertBox"></div>
      
      <!-- Generate Code -->
      <div class="card">
        <h3>➕ Generate New Code</h3>
        <form onsubmit="generateCode(event)">
          <div class="form-grid">
            <div class="form-group">
              <label>Role *</label>
              <select id="targetRole" required>
                <option value="staff">Staff (พนักงาน)</option>
                <option value="owner">Owner (เจ้าของ)</option>
                <option value="parent">Parent (ผู้ปกครอง)</option>
                <option value="student">Student (นักเรียน)</option>
              </select>
            </div>
            
            <div class="form-group">
              <label>Intended Email (optional)</label>
              <input type="email" id="intendedEmail" placeholder="somsri@example.com" />
            </div>
            
            <div class="form-group">
              <label>Name/Note (optional)</label>
              <input type="text" id="intendedName" placeholder="ครูสมศรี" />
            </div>
            
            <div class="form-group">
              <label>Expires in (days)</label>
              <select id="expiresDays">
                <option value="1">1 day</option>
                <option value="7" selected>7 days</option>
                <option value="14">14 days</option>
                <option value="30">30 days</option>
                <option value="90">90 days</option>
              </select>
            </div>
          </div>
          
          <button type="submit" class="btn-primary" id="genBtn">🎟️ Generate Code</button>
        </form>
        
        <div class="code-result" id="codeResult">
          <div style="text-align:center; font-size:13px; color:#166534; font-weight:600;">
            ✅ Code generated! Share with the new user:
          </div>
          <div class="code" id="generatedCode">SKKS-XXXX-XXXX</div>
          <div class="meta" id="codeMetaText">Expires: never</div>
          <button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>
        </div>
      </div>
      
      <!-- List Codes -->
      <div class="card">
        <h3>📋 All Invite Codes</h3>
        <div id="codesList">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/role-guard.js"></script>
  
  <script>
    function showAlert(msg, type = 'error') {
      const a = document.getElementById('alertBox');
      a.className = 'alert show ' + type;
      a.textContent = msg;
      setTimeout(() => a.className = 'alert', 4000);
    }
    
    async function generateCode(event) {
      event.preventDefault();
      
      const targetRole = document.getElementById('targetRole').value;
      const intendedEmail = document.getElementById('intendedEmail').value.trim() || null;
      const intendedName = document.getElementById('intendedName').value.trim() || null;
      const expiresDays = parseInt(document.getElementById('expiresDays').value);
      
      const btn = document.getElementById('genBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Generating...';
      
      const { data, error } = await supabaseClient.rpc('generate_invite_code', {
        p_target_role: targetRole,
        p_intended_email: intendedEmail,
        p_intended_name: intendedName,
        p_notes: null,
        p_expires_days: expiresDays
      });
      
      btn.disabled = false;
      btn.textContent = '🎟️ Generate Code';
      
      if (error) {
        showAlert('❌ ' + error.message, 'error');
        return;
      }
      
      if (data && data.length > 0) {
        const result = data[0];
        document.getElementById('generatedCode').textContent = result.invite_code;
        document.getElementById('codeMetaText').textContent = 
          `Role: ${targetRole.toUpperCase()} • Expires: ${new Date(result.expires).toLocaleString()}`;
        document.getElementById('codeResult').classList.add('show');
        
        showAlert('✅ Code generated successfully!', 'success');
        loadCodes();
      }
    }
    
    function copyCode() {
      const code = document.getElementById('generatedCode').textContent;
      navigator.clipboard.writeText(code).then(() => {
        showAlert('📋 Code copied to clipboard!', 'success');
      });
    }
    
    async function loadCodes() {
      const { data, error } = await supabaseClient
        .from('invite_codes')
        .select('*')
        .order('created_at', { ascending: false });
      
      const list = document.getElementById('codesList');
      
      if (error) {
        list.innerHTML = `<div class="empty">Error: ${error.message}</div>`;
        return;
      }
      
      if (!data || data.length === 0) {
        list.innerHTML = `<div class="empty">📭 No invite codes yet. Generate one above!</div>`;
        return;
      }
      
      const now = new Date();
      
      list.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Code</th>
              <th>Role</th>
              <th>For</th>
              <th>Status</th>
              <th>Expires</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(c => {
              let status = 'active';
              let statusText = 'Active';
              if (c.is_used) { status = 'used'; statusText = 'Used'; }
              else if (new Date(c.expires_at) < now) { status = 'expired'; statusText = 'Expired'; }
              
              return `
                <tr>
                  <td><span class="code-cell">${c.code}</span></td>
                  <td><span class="pill role-${c.target_role}">${c.target_role}</span></td>
                  <td>${c.intended_name || c.intended_email || '—'}</td>
                  <td><span class="pill status-${status}">${statusText}</span></td>
                  <td>${new Date(c.expires_at).toLocaleDateString()}</td>
                  <td>${new Date(c.created_at).toLocaleDateString()}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }
    
    async function init() {
      // Require owner/developer
      const profile = await roleGuard.requireOwner();
      if (!profile) return;
      
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      
      loadCodes();
    }
    
    init();
  </script>
</body>
</html>
