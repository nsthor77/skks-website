<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Attendance — PanyaSchoolKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../images/panya-mark.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --pk-blue-900: #1E3A8A; --pk-blue-800: #1E40AF; --pk-blue-700: #1D4ED8;
      --pk-blue-600: #2563EB; --pk-blue-100: #DBE5FF; --pk-blue-50: #EEF3FF;
      --pk-canvas: #EBF0FA; --pk-paper: #FFFFFF;
      --pk-ink: #0F1A36; --pk-ink-soft: #1F2A4E;
      --pk-ash: #4B5670; --pk-mist: #7B8497;
      --pk-border: #D8DEE9; --pk-border-em: #A8B2C4;
      --pk-success: #065F46; --pk-success-bg: #D1FAE5;
      --pk-warning: #92400E; --pk-warning-bg: #FEF3C7;
      --pk-danger: #991B1B; --pk-danger-bg: #FEE2E2;
      --pk-purple-bg: #EDE9FE; --pk-purple: #5B21B6;
      --pk-cyan-bg: #CFFAFE; --pk-cyan: #155E75;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans Thai', 'Inter', sans-serif; background: var(--pk-canvas); color: var(--pk-ink); min-height: 100vh; }
    .topbar { background: var(--pk-paper); border-bottom: 1px solid var(--pk-border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar img { height: 26px; }
    .back-link { color: var(--pk-ash); text-decoration: none; font-size: 13.5px; padding: 6px 12px; border-radius: 8px; }
    .back-link:hover { background: var(--pk-canvas); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px; }
    .page-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .page-header p { color: var(--pk-ash); font-size: 14px; margin-bottom: 20px; }

    .controls { background: var(--pk-paper); border: 1px solid var(--pk-border); border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .controls label { font-size: 12px; color: var(--pk-ash); font-weight: 600; }
    .controls input, .controls select { padding: 8px 12px; border: 1px solid var(--pk-border); border-radius: 8px; font-family: inherit; font-size: 14px; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 18px; }
    .stat-card { background: var(--pk-paper); padding: 14px 16px; border-radius: 10px; border: 1px solid var(--pk-border); }
    .stat-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--pk-ash); }
    .stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; font-family: 'Inter', sans-serif; }
    .stat-card.present .stat-value { color: var(--pk-success); }
    .stat-card.absent .stat-value { color: var(--pk-danger); }
    .stat-card.late .stat-value { color: var(--pk-warning); }

    .card { background: var(--pk-paper); border: 1px solid var(--pk-border); border-radius: 12px; overflow: hidden; }
    .history-list { padding: 4px; }
    .history-row { display: grid; grid-template-columns: 120px 1fr auto; gap: 14px; padding: 12px 16px; align-items: center; border-bottom: 1px solid #F0F2F7; }
    .history-row:last-child { border-bottom: none; }
    .history-row .date { font-family: 'Inter', monospace; font-weight: 600; color: var(--pk-blue-700); font-size: 13px; }
    .history-row .info .meta { color: var(--pk-mist); font-size: 12px; }
    .history-row .info .notes { color: var(--pk-ash); font-size: 12px; margin-top: 3px; font-style: italic; }

    .status-pill {
      display: inline-block; padding: 4px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .status-pill.present { background: var(--pk-success-bg); color: var(--pk-success); }
    .status-pill.absent  { background: var(--pk-danger-bg); color: var(--pk-danger); }
    .status-pill.late    { background: var(--pk-warning-bg); color: var(--pk-warning); }
    .status-pill.excused { background: var(--pk-blue-50); color: var(--pk-blue-700); }
    .status-pill.leave   { background: var(--pk-purple-bg); color: var(--pk-purple); }
    .status-pill.sick    { background: var(--pk-cyan-bg); color: var(--pk-cyan); }

    .empty { padding: 60px 20px; text-align: center; color: var(--pk-ash); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }

    @media (max-width: 768px) {
      .container { padding: 16px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .history-row { grid-template-columns: 1fr; gap: 6px; }
      input, select { font-size: 16px !important; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a href="../index.html"><img src="../images/panya-schoolkit-lockup.png" alt="Panya SchoolKit" /></a>
      <a href="dashboard.html" class="back-link" data-i18n="myAtt.back">← Dashboard</a>
    </div>
    <div class="topbar-right"></div>
  </div>

  <div class="container">
    <div class="page-header">
      <h1 data-i18n="myAtt.title">📋 My Attendance History</h1>
      <p data-i18n="myAtt.subtitle">View your attendance records</p>
    </div>

    <div class="controls">
      <label data-i18n="myAtt.from">From:</label>
      <input type="date" id="fromDate" />
      <label data-i18n="myAtt.to">To:</label>
      <input type="date" id="toDate" />
      <button class="btn-primary" onclick="loadHistory()" style="padding:8px 16px;border-radius:9px;background:#1E40AF;color:#fff;border:none;font-family:inherit;font-weight:600;cursor:pointer;" data-i18n="myAtt.refresh">🔄 Refresh</button>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-label" data-i18n="attendance.statTotal">Total</div><div class="stat-value" id="statTotal">—</div></div>
      <div class="stat-card present"><div class="stat-label" data-i18n="attendance.statPresent">Present</div><div class="stat-value" id="statPresent">—</div></div>
      <div class="stat-card absent"><div class="stat-label" data-i18n="attendance.statAbsent">Absent</div><div class="stat-value" id="statAbsent">—</div></div>
      <div class="stat-card late"><div class="stat-label" data-i18n="attendance.statLate">Late</div><div class="stat-value" id="statLate">—</div></div>
    </div>

    <div class="card">
      <div class="history-list" id="historyList">
        <div class="empty">⏳ Loading...</div>
      </div>
    </div>
  </div>

  <script src="../js/i18n.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/role-guard.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const session = await auth.getSession();
      if (!session) { window.location.href = '../login.html'; return; }

      const today = new Date();
      const ago30 = new Date(today.getTime() - 30 * 86400 * 1000);
      document.getElementById('fromDate').valueAsDate = ago30;
      document.getElementById('toDate').valueAsDate = today;

      document.getElementById('fromDate').addEventListener('change', loadHistory);
      document.getElementById('toDate').addEventListener('change', loadHistory);

      loadHistory();
    });
    document.addEventListener('langchange', () => loadHistory());

    async function loadHistory() {
      const from = document.getElementById('fromDate').value;
      const to = document.getElementById('toDate').value;

      document.getElementById('historyList').innerHTML = '<div class="empty">⏳ ' + t('common.loading') + '</div>';

      const { data, error } = await supabaseClient.rpc('get_my_attendance', {
        p_from: from || null, p_to: to || null
      });

      if (error) {
        document.getElementById('historyList').innerHTML = '<div class="empty">' + t('myAtt.loadFailed') + '</div>';
        return;
      }
      if (data?.error) {
        document.getElementById('historyList').innerHTML = '<div class="empty">' + t('myAtt.noAccess') + '</div>';
        return;
      }

      const sum = data.summary || {};
      document.getElementById('statTotal').textContent   = (sum.total ?? 0).toLocaleString();
      document.getElementById('statPresent').textContent = (sum.present ?? 0).toLocaleString();
      document.getElementById('statAbsent').textContent  = (sum.absent ?? 0).toLocaleString();
      document.getElementById('statLate').textContent    = (sum.late ?? 0).toLocaleString();

      renderHistory(data.rows || []);
    }

    function renderHistory(rows) {
      const list = document.getElementById('historyList');
      if (!rows.length) {
        list.innerHTML = `<div class="empty"><div class="icon">📅</div><h4>${t('myAtt.empty')}</h4><p>${t('myAtt.emptyDesc')}</p></div>`;
        return;
      }
      const lang = pkI18n.getLang();
      const dateOpts = { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' };
      list.innerHTML = rows.map(r => {
        const dateStr = new Date(r.attendance_date).toLocaleDateString(lang === 'th' ? 'th-TH' : 'en-US', dateOpts);
        const checkIn = r.check_in_at ? new Date(r.check_in_at).toLocaleTimeString(lang === 'th' ? 'th-TH' : 'en-US', { hour: '2-digit', minute: '2-digit' }) : '—';
        const statusLabel = t('attendance.status' + r.status.charAt(0).toUpperCase() + r.status.slice(1).replace(/_(\w)/g, (_,c) => c.toUpperCase())) || r.status;
        return `<div class="history-row">
          <div class="date">${esc(dateStr)}</div>
          <div class="info">
            <div class="meta">${t('attendance.checkIn')}: ${checkIn}</div>
            ${r.reason ? `<div class="notes">${t('attendance.reason')}: ${esc(r.reason)}</div>` : ''}
            ${r.notes ? `<div class="notes">${esc(r.notes)}</div>` : ''}
          </div>
          <div><span class="status-pill ${r.status}">${esc(statusLabel)}</span></div>
        </div>`;
      }).join('');
    }

    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  </script>
</body>
</html>
