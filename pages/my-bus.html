<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>รถรับส่งของฉัน — PanyaSchoolKit</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../images/panya-mark.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--pk-canvas:#EBF0FA;--pk-paper:#FFFFFF;--pk-ink:#0F1A36;--pk-ash:#4B5670;--pk-border:#D8DEE9;}
    *{box-sizing:border-box;margin:0;padding:0;} body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--pk-canvas);color:var(--pk-ink);min-height:100vh;}
    .topbar{background:var(--pk-paper);border-bottom:1px solid var(--pk-border);padding:14px 24px;display:flex;align-items:center;gap:16px;} .topbar img{height:26px;} .back-link{color:var(--pk-ash);text-decoration:none;font-size:13.5px;}
    .container{max-width:600px;margin:0 auto;padding:24px;}
    .page-title h1{font-size:23px;font-weight:700;} .page-title p{color:var(--pk-ash);font-size:13.5px;margin:4px 0 16px;}
    .card{background:var(--pk-paper);border:1px solid var(--pk-border);border-left:4px solid #F59E0B;border-radius:14px;padding:18px 20px;margin-bottom:12px;}
    .card h3{font-size:16px;font-weight:700;} .card .meta{font-size:13.5px;color:var(--pk-ash);margin-top:8px;line-height:1.7;}
    .empty{text-align:center;color:var(--pk-ash);padding:50px;}
  </style>
</head>
<body>
  <div class="topbar"><a href="../index.html"><img src="../images/panya-schoolkit-lockup.png" alt="Panya SchoolKit" /></a><a href="student-dashboard.html" class="back-link">← หน้าหลัก</a></div>
  <div class="container">
    <div class="page-title"><h1>🚌 รถรับส่งของฉัน</h1><p>สายรถ จุดรับ และคนขับ</p></div>
    <div id="list"><div class="empty">⏳ กำลังโหลด...</div></div>
  </div>
  <script src="../js/i18n.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const session = await auth.getSession(); if(!session){ window.location.href='../login.html'; return; }
      const box=document.getElementById('list');
      const { data, error } = await supabaseClient.rpc('get_my_bus');
      if(error){ box.innerHTML='<div class="empty">'+esc(error.message)+'</div>'; return; }
      const rows=data||[];
      if(!rows.length){ box.innerHTML='<div class="empty">ยังไม่ได้ลงทะเบียนรถรับส่ง</div>'; return; }
      box.innerHTML=rows.map(r=>`<div class="card"><h3>🚌 ${esc(r.route_name)}</h3>
        <div class="meta">นักเรียน: <b>${esc(r.student_name)}</b>${r.pickup_point?('<br>📍 จุดรับ: '+esc(r.pickup_point)):''}
          ${r.driver_name?('<br>คนขับ: '+esc(r.driver_name)):''}${r.driver_phone?(' ☎ '+esc(r.driver_phone)):''}
          ${r.vehicle?('<br>รถ: '+esc(r.vehicle)):''}${r.departure_time?('<br>⏰ ออก '+esc(r.departure_time)):''}${r.return_time?(' · กลับ '+esc(r.return_time)):''}</div></div>`).join('');
    });
    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  </script>
</body>
</html>
