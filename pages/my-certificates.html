<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Certificates — SKKS</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="icon" type="image/png" href="../images/logo.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .certs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
    .cert-card{background:white;border:1px solid #E5E7EB;border-radius:14px;padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
    .cert-card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,0.1)}
    .cert-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#D4AF37,#F4D03F)}
    .cert-card.honor::before{background:linear-gradient(90deg,#7F77DD,#5BB8E0)}
    .cert-card.graduation::before{background:linear-gradient(90deg,#1B5E3F,#10B981)}
    .cert-icon{font-size:48px;text-align:center;margin-bottom:10px}
    .cert-title{font-size:15px;font-weight:700;color:#1B5E3F;text-align:center;margin-bottom:6px;line-height:1.3}
    .cert-meta{font-size:11px;color:#6B7280;text-align:center;margin-bottom:14px;line-height:1.5}
    .cert-type{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;background:#F0FDF4;color:#1B5E3F}
    .cert-actions{display:flex;gap:8px;margin-top:14px}
    .cert-actions button{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px}
    .btn-view{background:#1B5E3F;color:white}
    .btn-share{background:#5BB8E0;color:white}
  </style>
</head>
<body>
  <div class="admin-topbar">
    <div class="admin-topbar-left">
      <a href="../index.html" class="admin-logo">
        <img src="../images/logo.png" alt="SKKS" />
        <h1>SKKS</h1>
      </a>
      <nav class="admin-nav">
        <a href="student-dashboard.html">🏠 Home</a>
        <a href="my-grades.html">📊 My Grades</a>
        <a href="my-bills.html">💰 My Bills</a>
        <a href="my-attendance.html">📅 Attendance</a>
        <a href="my-certificates.html" class="active">🏆 Certs</a>
        <a href="profile.html">👤 Profile</a>
      </nav>
    </div>
    <div class="admin-topbar-right">
      <button class="btn-logout" onclick="auth.logout()">Sign Out</button>
    </div>
  </div>

  <div class="admin-container">
    <div class="loading-state" id="loadingMsg">⏳ Loading...</div>
    
    <div id="content" style="display:none;">
      <div class="page-header">
        <div>
          <h2>🏆 My Certificates</h2>
          <p>ใบประกาศของฉัน</p>
        </div>
      </div>

      <div id="certsArea"></div>
    </div>
  </div>

  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/role-guard.js"></script>
  <script src="../js/data-helpers.js"></script>
  <script>
    async function init() {
      const profile = await requireStudent();
      if (!profile) return;
      
      const { data: student } = await supabaseClient
        .from('students')
        .select('*')
        .eq('profile_id', profile.id)
        .single();
      
      if (!student) {
        document.getElementById('loadingMsg').innerHTML = 
          '<p style="text-align:center;color:#9CA3AF;padding:40px;">No student record found.</p>';
        return;
      }
      
      const { data: certs } = await supabaseClient
        .from('certificates')
        .select('*')
        .eq('student_id', student.id)
        .eq('status', 'issued')
        .order('issued_date', { ascending: false });
      
      renderCerts(certs || []);
      
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }
    
    function renderCerts(certs) {
      const area = document.getElementById('certsArea');
      
      if (certs.length === 0) {
        area.innerHTML = `<div style="text-align:center;padding:80px;color:#9CA3AF;background:white;border-radius:14px;border:1px solid #E5E7EB;">
          <div style="font-size:64px;">🏆</div>
          <h3 style="color:#1B5E3F;margin:14px 0 6px;">ยังไม่มีใบประกาศ</h3>
          <p>ตั้งใจเรียนต่อไปนะ ใบประกาศจะมาเร็วๆ นี้!</p>
        </div>`;
        return;
      }
      
      area.innerHTML = '<div class="certs-grid">' + certs.map(c => {
        const icon = c.certificate_type === 'graduation' ? '🎓' : 
                     c.certificate_type === 'honor' ? '⭐' : 
                     c.certificate_type === 'achievement' ? '🏅' : '🏆';
        const cls = c.certificate_type;
        
        return `<div class="cert-card ${cls}">
          <div class="cert-icon">${icon}</div>
          <div class="cert-title">${c.title}</div>
          <div class="cert-meta">
            ${c.certificate_number}<br>
            Issued: ${new Date(c.issued_date).toLocaleDateString('th-TH')}<br>
            ${c.achievement || ''}
          </div>
          <div style="text-align:center;">
            <span class="cert-type">${c.certificate_type}</span>
          </div>
          <div class="cert-actions">
            <button class="btn-view" onclick="viewCert('${c.qr_verification_code}')">👁️ View</button>
            <button class="btn-share" onclick="shareCert('${c.qr_verification_code}', '${c.title}')">🔗 Share</button>
          </div>
        </div>`;
      }).join('') + '</div>';
    }
    
    function viewCert(code) {
      window.open('/verify.html?code=' + encodeURIComponent(code), '_blank');
    }
    
    async function shareCert(code, title) {
      const url = `${window.location.origin}/verify.html?code=${encodeURIComponent(code)}`;
      
      if (navigator.share) {
        try {
          await navigator.share({ title: title, text: 'My certificate from SKKS', url: url });
        } catch(e) {}
      } else {
        await navigator.clipboard.writeText(url);
        alert('✅ Link copied to clipboard!\n\n' + url);
      }
    }
    
    init();
  </script>
</body>
</html>
