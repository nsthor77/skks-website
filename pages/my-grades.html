<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Grades — PanyaSchoolKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../images/panya-mark.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --pk-blue-900: #1E3A8A; --pk-blue-800: #1E40AF; --pk-blue-700: #1D4ED8;
      --pk-blue-600: #2563EB; --pk-blue-100: #DBE5FF; --pk-blue-50: #EEF3FF;
      --pk-canvas: #EBF0FA; --pk-paper: #FFFFFF;
      --pk-ink: #0F1A36; --pk-ink-soft: #1F2A4E;
      --pk-ash: #4B5670; --pk-mist: #7B8497;
      --pk-border: #D8DEE9; --pk-border-em: #A8B2C4;
      --pk-success: #065F46; --pk-success-bg: #D1FAE5;
      --pk-warning: #92400E; --pk-warning-bg: #FEF3C7;
      --pk-danger: #991B1B; --pk-danger-bg: #FEE2E2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans Thai', 'Inter', sans-serif; background: var(--pk-canvas); color: var(--pk-ink); min-height: 100vh; }
    .topbar { background: var(--pk-paper); border-bottom: 1px solid var(--pk-border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar img { height: 26px; }
    .back-link { color: var(--pk-ash); text-decoration: none; font-size: 13.5px; padding: 6px 12px; border-radius: 8px; }
    .back-link:hover { background: var(--pk-canvas); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .container { max-width: 1000px; margin: 0 auto; padding: 24px; }
    .page-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .page-header p { color: var(--pk-ash); font-size: 14px; margin-bottom: 20px; }

    .controls { background: var(--pk-paper); border: 1px solid var(--pk-border); border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .controls label { font-size: 12px; color: var(--pk-ash); font-weight: 600; }
    .controls input, .controls select { padding: 8px 12px; border: 1px solid var(--pk-border); border-radius: 8px; font-family: inherit; font-size: 14px; }
    .btn { padding: 8px 16px; border-radius: 9px; background: var(--pk-blue-800); color: #fff; border: none; font-family: inherit; font-weight: 600; cursor: pointer; }
    .btn:hover { background: var(--pk-blue-900); }
    .btn-secondary { background: var(--pk-paper); color: var(--pk-ink-soft); border: 1px solid var(--pk-border-em); }
    .btn-secondary:hover { background: var(--pk-canvas); }

    /* GPA Hero card */
    .gpa-card {
      background: linear-gradient(135deg, var(--pk-blue-800), var(--pk-blue-900));
      color: var(--pk-paper);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      box-shadow: 0 4px 20px -8px rgba(30,64,175,0.4);
    }
    .gpa-card .gpa-num { font-size: 60px; font-weight: 800; font-family: 'Inter', sans-serif; line-height: 1; }
    .gpa-card .gpa-label { font-size: 12px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.06em; }
    .gpa-card .gpa-meta { display: flex; gap: 28px; }
    .gpa-card .meta-item .v { font-size: 22px; font-weight: 700; font-family: 'Inter', sans-serif; }
    .gpa-card .meta-item .l { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.04em; }

    .card { background: var(--pk-paper); border: 1px solid var(--pk-border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead { background: var(--pk-canvas); }
    th { text-align: left; padding: 11px 14px; font-weight: 600; font-size: 11px; color: var(--pk-ash); text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 12px 14px; border-bottom: 1px solid #F0F2F7; }
    tr:last-child td { border-bottom: none; }

    .grade-pill {
      display: inline-block; padding: 4px 12px; border-radius: 100px;
      font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif;
      min-width: 44px; text-align: center;
    }
    .grade-A { background: #D1FAE5; color: #065F46; }
    .grade-B { background: #DBEAFE; color: #1E40AF; }
    .grade-C { background: #FEF3C7; color: #92400E; }
    .grade-D { background: #FED7AA; color: #9A3412; }
    .grade-F { background: #FEE2E2; color: #991B1B; }
    .grade-P { background: #D1FAE5; color: #065F46; }

    .score-cell { font-family: 'Inter', monospace; font-weight: 600; color: var(--pk-blue-700); }
    .comments-cell { color: var(--pk-ash); font-size: 12px; font-style: italic; }

    .empty { padding: 60px 20px; text-align: center; color: var(--pk-ash); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }

    @media (max-width: 768px) {
      .container { padding: 16px; }
      .gpa-card { flex-direction: column; align-items: flex-start; padding: 20px; }
      .gpa-card .gpa-num { font-size: 48px; }
      .gpa-card .gpa-meta { width: 100%; gap: 16px; }
      input, select { font-size: 16px !important; }
      th, td { padding: 8px 10px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a href="../index.html"><img src="../images/panya-schoolkit-lockup.png" alt="Panya SchoolKit" /></a>
      <a href="dashboard.html" class="back-link" data-i18n="myGrades.back">← Dashboard</a>
    </div>
    <div class="topbar-right"></div>
  </div>

  <div class="container">
    <div class="page-header">
      <h1 data-i18n="myGrades.title">📝 My Grades</h1>
      <p data-i18n="myGrades.subtitle">View your grade history and download report card</p>
    </div>

    <div class="controls">
      <label data-i18n="myGrades.year">Academic Year:</label>
      <select id="yearSelect"><option value="" data-i18n="myGrades.allYears">All years</option></select>
      <label data-i18n="myGrades.term">Term:</label>
      <select id="termSelect">
        <option value="" data-i18n="myGrades.allTerms">All terms</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="summer" data-i18n="grades.termSummer">Summer</option>
      </select>
      <button class="btn" onclick="loadGrades()" data-i18n="myGrades.refresh">🔄 Refresh</button>
      <button class="btn btn-secondary" onclick="downloadReportCard()" data-i18n="myGrades.downloadPdf">📄 Download Report Card</button>
    </div>

    <div id="gpaSection"></div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th data-i18n="myGrades.colYearTerm">Year/Term</th>
            <th data-i18n="myGrades.colSubject">Subject</th>
            <th data-i18n="myGrades.colMidterm">Midterm</th>
            <th data-i18n="myGrades.colFinal">Final</th>
            <th data-i18n="myGrades.colTotal">Total</th>
            <th data-i18n="myGrades.colGrade">Grade</th>
            <th data-i18n="myGrades.colComments">Comments</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7"><div class="empty">⏳ Loading...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="../js/i18n.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/role-guard.js"></script>

  <script>
    let currentData = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const session = await auth.getSession();
      if (!session) { window.location.href = '../login.html'; return; }
      bindFilters();
      loadGrades();
    });
    document.addEventListener('langchange', render);

    function bindFilters() {
      document.getElementById('yearSelect').addEventListener('change', loadGrades);
      document.getElementById('termSelect').addEventListener('change', loadGrades);
    }

    async function loadGrades() {
      const year = document.getElementById('yearSelect').value;
      const term = document.getElementById('termSelect').value;
      document.getElementById('tbody').innerHTML = '<tr><td colspan="7"><div class="empty">⏳ ' + t('common.loading') + '</div></td></tr>';

      const { data, error } = await supabaseClient.rpc('get_my_grades', {
        p_academic_year: year || null, p_term: term || null
      });
      if (error) {
        document.getElementById('tbody').innerHTML = '<tr><td colspan="7"><div class="empty">' + t('myGrades.loadFailed') + '</div></td></tr>';
        return;
      }
      if (data?.error) {
        document.getElementById('tbody').innerHTML = '<tr><td colspan="7"><div class="empty">' + t('myGrades.noAccess') + '</div></td></tr>';
        return;
      }
      currentData = data;
      // Build year filter from data
      const yearSel = document.getElementById('yearSelect');
      const existingYears = new Set([...yearSel.options].map(o => o.value));
      (data.rows || []).forEach(r => {
        if (r.academic_year && !existingYears.has(r.academic_year)) {
          existingYears.add(r.academic_year);
          const opt = document.createElement('option');
          opt.value = r.academic_year; opt.textContent = r.academic_year;
          yearSel.appendChild(opt);
        }
      });
      render();
    }

    function render() {
      if (!currentData) return;
      // GPA card
      const gpaHtml = currentData.gpa !== null && currentData.gpa !== undefined
        ? `<div class="gpa-card">
            <div>
              <div class="gpa-label">${t('myGrades.gpaLabel')}</div>
              <div class="gpa-num">${Number(currentData.gpa).toFixed(2)}</div>
            </div>
            <div class="gpa-meta">
              <div class="meta-item">
                <div class="v">${currentData.total_credits ?? 0}</div>
                <div class="l">${t('myGrades.totalCredits')}</div>
              </div>
              <div class="meta-item">
                <div class="v">${(currentData.rows || []).length}</div>
                <div class="l">${t('myGrades.subjects')}</div>
              </div>
            </div>
          </div>`
        : '';
      document.getElementById('gpaSection').innerHTML = gpaHtml;

      const tbody = document.getElementById('tbody');
      const rows = currentData.rows || [];
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="icon">📝</div><h4>${t('myGrades.empty')}</h4><p>${t('myGrades.emptyDesc')}</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(g => {
        const gradeClass = 'grade-' + (g.grade_label || '').replace(/[+\-]/g, '').charAt(0).toUpperCase();
        return `<tr>
          <td>${esc(g.academic_year || '')} / ${esc(g.term || '')}</td>
          <td><strong>${esc(g.subject_code || '')}</strong> ${esc(g.subject_name || '')}</td>
          <td class="score-cell">${g.score_midterm ?? '—'}</td>
          <td class="score-cell">${g.score_final ?? '—'}</td>
          <td class="score-cell">${g.score_total ?? '—'}</td>
          <td>${g.grade_label ? `<span class="grade-pill ${gradeClass}">${esc(g.grade_label)}</span>` : '—'}</td>
          <td class="comments-cell">${esc(g.comments || '')}</td>
        </tr>`;
      }).join('');
    }

    async function downloadReportCard() {
      const year = document.getElementById('yearSelect').value;
      const term = document.getElementById('termSelect').value;
      if (!year || !term) { alert(t('myGrades.selectYearTerm')); return; }
      const { data: { session } } = await supabaseClient.auth.getSession();
      const url = `/api/grades/report-card-pdf?year=${encodeURIComponent(year)}&term=${encodeURIComponent(term)}`;
      try {
        const resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + session.access_token } });
        if (!resp.ok) throw new Error('Failed');
        const blob = await resp.blob();
        const dlUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = dlUrl; a.download = `report-card-${year}-${term}.pdf`;
        a.click();
        URL.revokeObjectURL(dlUrl);
      } catch (e) {
        alert(t('myGrades.pdfFailed') + ': ' + e.message);
      }
    }

    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  </script>
</body>
</html>
