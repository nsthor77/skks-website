<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Grades — SKKS</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="icon" type="image/png" href="../images/logo.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .summary-card{background:linear-gradient(135deg,#1B5E3F 0%,#5BB8E0 100%);color:white;padding:24px;border-radius:14px;margin-bottom:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;text-align:center}
    .summary-num{font-size:32px;font-weight:800;line-height:1}
    .summary-lbl{font-size:12px;opacity:0.9;margin-top:6px;text-transform:uppercase;letter-spacing:1px}
    
    .grades-table{background:white;border-radius:12px;overflow:hidden;border:1px solid #E5E7EB}
    table{width:100%;border-collapse:collapse}
    th{background:#F0FDF4;color:#1B5E3F;padding:12px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
    td{padding:14px;border-top:1px solid #F3F4F6;font-size:13px}
    
    .grade-letter{display:inline-block;font-weight:800;padding:4px 10px;border-radius:6px;font-size:13px}
    .grade-a{background:#DCFCE7;color:#15803D}
    .grade-b{background:#DBEAFE;color:#1E40AF}
    .grade-c{background:#FEF3C7;color:#A16207}
    .grade-d{background:#FED7AA;color:#9A3412}
    .grade-f{background:#FEE2E2;color:#991B1B}
    
    .progress-bar{height:6px;background:#F3F4F6;border-radius:3px;overflow:hidden;margin-top:4px}
    .progress-fill{height:100%;background:linear-gradient(90deg,#1B5E3F,#5BB8E0);border-radius:3px}
  </style>
</head>
<body>
  <div class="admin-topbar">
    <div class="admin-topbar-left">
      <a href="../index.html" class="admin-logo">
        <img src="../images/logo.png" alt="SKKS" />
        <h1>SKKS</h1>
      </a>
      <nav class="admin-nav">
        <a href="student-dashboard.html">🏠 Home</a>
        <a href="my-grades.html" class="active">📊 My Grades</a>
        <a href="my-bills.html">💰 My Bills</a>
        <a href="my-attendance.html">📅 Attendance</a>
        <a href="my-certificates.html">🏆 Certs</a>
        <a href="profile.html">👤 Profile</a>
      </nav>
    </div>
    <div class="admin-topbar-right">
      <button class="btn-logout" onclick="auth.logout()">Sign Out</button>
    </div>
  </div>

  <div class="admin-container">
    <div class="loading-state" id="loadingMsg">⏳ Loading...</div>
    
    <div id="content" style="display:none;">
      <div class="page-header">
        <div>
          <h2>📊 My Grades</h2>
          <p>คะแนนของฉันในทุกวิชา</p>
        </div>
        <select id="termFilter" onchange="renderGrades()">
          <option value="all">All Terms</option>
          <option value="1/2026">Term 1/2026</option>
          <option value="2/2026">Term 2/2026</option>
        </select>
      </div>

      <div class="summary-card">
        <div>
          <div class="summary-num" id="overallGPA">—</div>
          <div class="summary-lbl">Overall GPA</div>
        </div>
        <div>
          <div class="summary-num" id="avgScore">—</div>
          <div class="summary-lbl">Average Score</div>
        </div>
        <div>
          <div class="summary-num" id="totalSubjects">—</div>
          <div class="summary-lbl">Subjects</div>
        </div>
      </div>

      <div class="grades-table">
        <table>
          <thead>
            <tr>
              <th>Subject</th>
              <th>Term</th>
              <th>Assignment</th>
              <th>Midterm</th>
              <th>Final</th>
              <th>Total</th>
              <th>Grade</th>
            </tr>
          </thead>
          <tbody id="gradesTbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/role-guard.js"></script>
  <script src="../js/data-helpers.js"></script>
  <script>
    let allGrades = [];
    let currentStudent = null;
    
    async function init() {
      const profile = await requireStudent();
      if (!profile) return;
      
      const { data: student } = await supabaseClient
        .from('students')
        .select('*')
        .eq('profile_id', profile.id)
        .single();
      
      if (!student) {
        document.getElementById('loadingMsg').innerHTML = 
          '<p style="text-align:center;color:#9CA3AF;padding:40px;">No student record found.</p>';
        return;
      }
      
      currentStudent = student;
      
      const { data: grades } = await supabaseClient
        .from('student_grades')
        .select('*, subjects(name, name_th, code)')
        .eq('student_id', student.id)
        .order('created_at', { ascending: false });
      
      allGrades = grades || [];
      renderGrades();
      
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }
    
    function renderGrades() {
      const term = document.getElementById('termFilter').value;
      let filtered = allGrades;
      
      if (term !== 'all') {
        const [t, y] = term.split('/');
        filtered = allGrades.filter(g => g.term === t && g.academic_year === y);
      }
      
      if (filtered.length === 0) {
        document.getElementById('gradesTbody').innerHTML = 
          '<tr><td colspan="7" style="text-align:center;color:#9CA3AF;padding:40px;">ยังไม่มีคะแนนในเทอมนี้</td></tr>';
        document.getElementById('overallGPA').textContent = '—';
        document.getElementById('avgScore').textContent = '—';
        document.getElementById('totalSubjects').textContent = '0';
        return;
      }
      
      const avgGPA = filtered.reduce((sum, g) => sum + Number(g.gpa || 0), 0) / filtered.length;
      const avgScore = filtered.reduce((sum, g) => sum + Number(g.total_score || 0), 0) / filtered.length;
      
      document.getElementById('overallGPA').textContent = avgGPA.toFixed(2);
      document.getElementById('avgScore').textContent = avgScore.toFixed(1);
      document.getElementById('totalSubjects').textContent = filtered.length;
      
      document.getElementById('gradesTbody').innerHTML = filtered.map(g => {
        const letter = g.letter_grade || 'N/A';
        const cls = letter.startsWith('A') ? 'grade-a' : letter.startsWith('B') ? 'grade-b' :
                    letter.startsWith('C') ? 'grade-c' : letter.startsWith('D') ? 'grade-d' : 'grade-f';
        const total = Number(g.total_score || 0);
        return `<tr>
          <td>
            <div style="font-weight:600;color:#1B5E3F;">${g.subjects?.name || '—'}</div>
            <div style="font-size:11px;color:#9CA3AF;">${g.subjects?.code || ''}</div>
          </td>
          <td>${g.term}/${g.academic_year}</td>
          <td>${Number(g.assignment_score || 0).toFixed(1)}</td>
          <td>${Number(g.midterm_score || 0).toFixed(1)}</td>
          <td>${Number(g.final_score || 0).toFixed(1)}</td>
          <td>
            <div style="font-weight:700;color:#1B5E3F;">${total.toFixed(1)}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${total}%"></div></div>
          </td>
          <td><span class="grade-letter ${cls}">${letter}</span></td>
        </tr>`;
      }).join('');
    }
    
    init();
  </script>
</body>
</html>
