<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คัดกรองนักเรียนยากจน — PanyaSchoolKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../images/panya-mark.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--pk-blue-800:#1E40AF;--pk-blue-50:#EEF3FF;--pk-canvas:#EBF0FA;--pk-paper:#FFFFFF;--pk-ink:#0F1A36;--pk-ink-soft:#1F2A4E;--pk-ash:#4B5670;--pk-border:#D8DEE9;--pk-border-em:#A8B2C4;--pk-success:#065F46;--pk-success-bg:#D1FAE5;--pk-danger:#991B1B;--pk-danger-bg:#FEE2E2;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:var(--pk-canvas);color:var(--pk-ink);min-height:100vh;}
    .topbar{background:var(--pk-paper);border-bottom:1px solid var(--pk-border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .topbar-left{display:flex;align-items:center;gap:16px;} .topbar img{height:26px;}
    .back-link{color:var(--pk-ash);text-decoration:none;font-size:13.5px;padding:6px 12px;border-radius:8px;}
    .container{max-width:820px;margin:0 auto;padding:24px;}
    .page-title h1{font-size:23px;font-weight:700;} .page-title p{color:var(--pk-ash);font-size:13.5px;margin-top:4px;margin-bottom:16px;}
    .card{background:var(--pk-paper);border:1px solid var(--pk-border);border-radius:14px;padding:18px 20px;margin-bottom:16px;}
    .btn{padding:9px 16px;border-radius:9px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border:none;}
    .btn-primary{background:var(--pk-blue-800);color:#fff;} .btn-danger{background:var(--pk-danger-bg);color:var(--pk-danger);} .btn-sm{padding:6px 12px;font-size:12px;}
    label.fl{display:block;font-size:12px;color:var(--pk-ash);font-weight:600;margin-bottom:4px;}
    input,select,textarea{padding:9px 12px;border:1px solid var(--pk-border);border-radius:8px;font-family:inherit;font-size:14px;}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
    .factors{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
    .factors label{display:flex;gap:9px;align-items:flex-start;font-size:13px;padding:9px 11px;border:1px solid var(--pk-border);border-radius:9px;cursor:pointer;line-height:1.4;}
    .factors label:has(input:checked){background:var(--pk-blue-50);border-color:var(--pk-blue-800);}
    .factors input{margin-top:2px;}
    .result{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;border-radius:12px;margin-top:14px;font-size:14px;}
    .r-none{background:#F1F5F9;color:#475569;} .r-poor{background:#FEF3C7;color:#92400E;} .r-extra{background:#FEE2E2;color:#991B1B;}
    .result .big{font-size:18px;font-weight:800;}
    table.hist{width:100%;border-collapse:collapse;font-size:13px;} table.hist th,table.hist td{padding:8px;border-bottom:1px solid #EEF2F7;text-align:left;}
    table.hist th{font-size:11px;color:var(--pk-ash);text-transform:uppercase;}
    .badge{padding:3px 10px;border-radius:20px;font-weight:700;font-size:12px;}
    .b-none{background:#F1F5F9;color:#475569;}.b-poor{background:#FEF3C7;color:#92400E;}.b-extra{background:#FEE2E2;color:#991B1B;}
    .empty{color:var(--pk-ash);font-size:13px;padding:10px 0;}
    .toast{position:fixed;bottom:28px;right:28px;background:var(--pk-ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;z-index:200;}
    .toast.show{opacity:1;}.toast.success{background:var(--pk-success);}.toast.error{background:var(--pk-danger);}
    @media(max-width:640px){.container{padding:14px;}input,select,textarea{font-size:16px;}.factors{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <a href="../index.html"><img src="../images/panya-schoolkit-lockup.png" alt="Panya SchoolKit" /></a>
      <a href="dashboard.html" class="back-link">← แดชบอร์ด</a>
    </div><div></div>
  </div>

  <div class="container">
    <div class="page-title">
      <h1>💗 คัดกรองนักเรียนยากจน</h1>
      <p>ปัจจัยพื้นฐานนักเรียนยากจน (เกณฑ์ กสศ./CCT) · คำนวณรายได้เฉลี่ยต่อคน + จัดกลุ่มอัตโนมัติ</p>
    </div>

    <div class="card">
      <div class="row" style="margin-bottom:14px;">
        <div style="flex:2;min-width:200px;"><label class="fl">นักเรียน</label>
          <select id="student" onchange="loadHistory()" style="width:100%;"><option value="">— เลือกนักเรียน —</option></select>
        </div>
        <div><label class="fl">วันที่คัดกรอง</label><input type="date" id="sdate" /></div>
      </div>

      <div class="row">
        <div><label class="fl">รายได้ครัวเรือนรวม/เดือน (บาท)</label><input type="number" id="income" min="0" oninput="recalc()" style="width:200px;" placeholder="เช่น 9000" /></div>
        <div><label class="fl">จำนวนสมาชิกในครัวเรือน</label><input type="number" id="members" min="1" value="4" oninput="recalc()" style="width:140px;" /></div>
        <div><label class="fl">รายได้เฉลี่ย/คน/เดือน</label><input id="percap" readonly style="width:160px;background:#F8FAFC;" /></div>
      </div>

      <div style="margin-top:16px;"><label class="fl">ปัจจัยพื้นฐาน (เลือกที่ตรงกับครอบครัว)</label>
        <div class="factors" id="factors">
          <label><input type="checkbox" data-f="dependents" onchange="recalc()"><span>ครอบครัวมีภาระพึ่งพิง (ผู้พิการ/ผู้สูงอายุเกิน 60/ว่างงาน/เด็กเล็กหลายคน)</span></label>
          <label><input type="checkbox" data-f="no_car" onchange="recalc()"><span>ไม่มีรถยนต์ส่วนบุคคล</span></label>
          <label><input type="checkbox" data-f="poor_housing" onchange="recalc()"><span>สภาพที่อยู่อาศัยทรุดโทรม/ไม่มั่นคง</span></label>
          <label><input type="checkbox" data-f="no_land" onchange="recalc()"><span>ไม่มีที่ดินทำกิน (หรือมีน้อยกว่า 1 ไร่)</span></label>
          <label><input type="checkbox" data-f="rented" onchange="recalc()"><span>อาศัยบ้านเช่า/อยู่กับผู้อื่น</span></label>
          <label><input type="checkbox" data-f="no_utilities" onchange="recalc()"><span>ไม่มีไฟฟ้า หรือไม่มีน้ำประปาใช้</span></label>
          <label><input type="checkbox" data-f="welfare_card" onchange="recalc()"><span>มีบัตรสวัสดิการแห่งรัฐ/รับความช่วยเหลือ</span></label>
          <label><input type="checkbox" data-f="no_steady_income" onchange="recalc()"><span>หัวหน้าครอบครัวไม่มีรายได้ประจำ</span></label>
        </div>
      </div>

      <div style="margin-top:14px;"><label class="fl">หมายเหตุ</label><textarea id="note" rows="2" style="width:100%;"></textarea></div>

      <div class="result r-none" id="result">
        <div><div style="font-size:12px;opacity:.8;">ผลการคัดกรอง</div><div class="big" id="rText">กรอกรายได้เพื่อประเมิน</div></div>
        <button class="btn btn-primary" id="saveBtn" onclick="savePoverty()">💾 บันทึกผล</button>
      </div>
    </div>

    <div class="card">
      <h2 style="font-size:15px;font-weight:700;margin-bottom:8px;">📋 ประวัติการคัดกรอง</h2>
      <div id="hist"><div class="empty">เลือกนักเรียนเพื่อดูประวัติ</div></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/i18n.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/role-guard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const prof = await roleGuard.requireTeacher();
      if (!prof) return;
      document.getElementById('sdate').valueAsDate = new Date();
      await loadStudents();
      recalc();
    });
    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    async function loadStudents() {
      let all=[], from=0; const size=1000;
      while(true){
        const { data, error } = await supabaseClient.from('students').select('id,first_name_th,last_name_th,grade,classroom,status').range(from,from+size-1);
        if(error) break; all=all.concat(data||[]); if(!data||data.length<size) break; from+=size; if(from>20000) break;
      }
      all = all.filter(s=>!s.status||s.status==='active').sort((a,b)=>((a.grade||'')+(a.classroom||'')).localeCompare((b.grade||'')+(b.classroom||''),'th',{numeric:true}));
      document.getElementById('student').insertAdjacentHTML('beforeend', all.map(s=>
        `<option value="${s.id}">${esc((s.first_name_th||'')+' '+(s.last_name_th||''))} · ${esc(s.grade||'')}${s.classroom?('/'+esc(s.classroom)):''}</option>`).join(''));
    }

    function getFactors(){ const f={}; let n=0; document.querySelectorAll('#factors input[type=checkbox]').forEach(c=>{ f[c.dataset.f]=c.checked; if(c.checked)n++; }); return {f,n}; }

    function classify(perCapita){
      if (perCapita == null || isNaN(perCapita)) return 'ไม่เข้าเกณฑ์';
      if (perCapita <= 1500) return 'ยากจนพิเศษ';
      if (perCapita <= 3000) return 'ยากจน';
      return 'ไม่เข้าเกณฑ์';
    }
    function rclass(c){ return c==='ยากจนพิเศษ'?'r-extra':(c==='ยากจน'?'r-poor':'r-none'); }
    function bclass(c){ return c==='ยากจนพิเศษ'?'b-extra':(c==='ยากจน'?'b-poor':'b-none'); }

    function recalc() {
      const income = parseFloat(document.getElementById('income').value);
      const members = parseInt(document.getElementById('members').value,10) || 0;
      let pc = null;
      if (!isNaN(income) && members>0) { pc = Math.round((income/members)*100)/100; document.getElementById('percap').value = pc.toLocaleString('th-TH')+' บาท'; }
      else document.getElementById('percap').value = '';
      const c = classify(pc);
      const {n} = getFactors();
      const box = document.getElementById('result');
      box.className = 'result ' + rclass(c);
      document.getElementById('rText').textContent = (pc==null) ? 'กรอกรายได้เพื่อประเมิน'
        : (c + '  ·  ' + (pc).toLocaleString('th-TH') + ' บาท/คน/เดือน' + (n?('  ·  '+n+' ปัจจัย'):''));
    }

    async function savePoverty() {
      const sid = document.getElementById('student').value;
      if (!sid) { toast('เลือกนักเรียนก่อน','error'); return; }
      const income = parseFloat(document.getElementById('income').value);
      const members = parseInt(document.getElementById('members').value,10) || 0;
      if (isNaN(income) || members<=0) { toast('กรอกรายได้และจำนวนสมาชิก','error'); return; }
      const pc = Math.round((income/members)*100)/100;
      const {f,n} = getFactors();
      const c = classify(pc);
      const btn=document.getElementById('saveBtn'); btn.disabled=true; const old=btn.textContent; btn.textContent='⏳';
      const { data, error } = await supabaseClient.rpc('save_poverty', {
        p_id:null, p_student_id:sid, p_income:income, p_members:members, p_per_capita:pc,
        p_factors:f, p_factor_count:n, p_classification:c, p_note:document.getElementById('note').value.trim()||null,
        p_screened_on:document.getElementById('sdate').value||null, p_year:null
      });
      btn.disabled=false; btn.textContent=old;
      if (error || !data || !data.success) { toast((data&&data.error)||(error&&error.message)||'บันทึกไม่สำเร็จ','error'); return; }
      toast('บันทึกผลคัดกรองแล้ว','success');
      loadHistory();
    }

    async function loadHistory() {
      const sid = document.getElementById('student').value;
      const box = document.getElementById('hist');
      if (!sid) { box.innerHTML='<div class="empty">เลือกนักเรียนเพื่อดูประวัติ</div>'; return; }
      const { data, error } = await supabaseClient.rpc('get_poverty', { p_student_id: sid });
      if (error) { box.innerHTML='<div class="empty">'+esc(error.message)+'</div>'; return; }
      if (!data || !data.length) { box.innerHTML='<div class="empty">ยังไม่เคยคัดกรอง</div>'; return; }
      box.innerHTML = `<table class="hist"><thead><tr><th>วันที่</th><th>รายได้/คน</th><th>ปัจจัย</th><th>ผล</th><th></th></tr></thead><tbody>`
        + data.map(r => `<tr>
            <td>${new Date(r.screened_on).toLocaleDateString('th-TH')}</td>
            <td>${r.per_capita!=null?Number(r.per_capita).toLocaleString('th-TH'):'-'}</td>
            <td>${r.factor_count||0}</td>
            <td><span class="badge ${bclass(r.classification)}">${esc(r.classification||'-')}</span></td>
            <td><button class="btn btn-danger btn-sm" onclick="delPoverty('${r.id}')">ลบ</button></td>
          </tr>`).join('') + '</tbody></table>';
    }
    async function delPoverty(id){
      if(!confirm('ลบผลการคัดกรองนี้?')) return;
      const { data } = await supabaseClient.rpc('delete_poverty', { p_id:id });
      if(data&&data.success){ toast('ลบแล้ว','success'); loadHistory(); } else toast('ลบไม่สำเร็จ','error');
    }

    let toastTimer=null;
    function toast(msg,type){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show '+(type||''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className='toast',2600); }
  </script>
</body>
</html>
