<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — PanyaSchoolKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../images/panya-mark.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--pk-blue-900:#1E3A8A;--pk-blue-800:#1E40AF;--pk-blue-600:#2563EB;--pk-blue-50:#EEF3FF;--pk-canvas:#EBF0FA;--pk-paper:#FFFFFF;--pk-ink:#0F1A36;--pk-ink-soft:#1F2A4E;--pk-ash:#4B5670;--pk-mist:#7B8497;--pk-border:#D8DEE9;--pk-border-em:#A8B2C4;--pk-success:#065F46;--pk-success-bg:#D1FAE5;--pk-warn:#92400E;--pk-warn-bg:#FEF3C7;--pk-danger:#991B1B;--pk-danger-bg:#FEE2E2;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:var(--pk-canvas);color:var(--pk-ink);min-height:100vh;}
    .topbar{background:var(--pk-paper);border-bottom:1px solid var(--pk-border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .topbar-left{display:flex;align-items:center;gap:16px;} .topbar img{height:26px;}
    .back-link{color:var(--pk-ash);text-decoration:none;font-size:13.5px;padding:6px 12px;border-radius:8px;cursor:pointer;}
    .container{max-width:820px;margin:0 auto;padding:24px;}
    .page-header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:16px;}
    .page-title h1{font-size:24px;font-weight:700;} .page-title p{color:var(--pk-ash);font-size:14px;margin-top:4px;}
    .btn{padding:9px 16px;border-radius:9px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border:none;}
    .btn-primary{background:var(--pk-blue-800);color:#fff;}.btn-secondary{background:var(--pk-paper);color:var(--pk-ink-soft);border:1px solid var(--pk-border-em);}
    .btn-success{background:var(--pk-success-bg);color:var(--pk-success);}.btn-danger{background:var(--pk-danger-bg);color:var(--pk-danger);}.btn-sm{padding:6px 12px;font-size:12px;}
    .card{background:var(--pk-paper);border:1px solid var(--pk-border);border-radius:12px;padding:16px 18px;margin-bottom:12px;}
    .q-card{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:flex-start;}
    .q-info h3{font-size:15.5px;font-weight:700;color:var(--pk-blue-800);}
    .q-info .meta{font-size:12.5px;color:var(--pk-ash);margin-top:5px;}
    .status{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;text-transform:uppercase;}
    .s-draft{background:#E5E7EB;color:#374151;}.s-open{background:var(--pk-success-bg);color:var(--pk-success);}.s-closed{background:var(--pk-warn-bg);color:var(--pk-warn);}
    .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;background:var(--pk-blue-50);color:var(--pk-blue-800);margin-right:6px;}
    .actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
    .empty{text-align:center;padding:50px 20px;color:var(--pk-ash);}.empty .icon{font-size:44px;margin-bottom:10px;}
    .field{margin-bottom:12px;}.field label{display:block;font-size:12px;color:var(--pk-ash);font-weight:600;margin-bottom:4px;}
    .field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--pk-border);border-radius:8px;font-family:inherit;font-size:14px;}
    .row2{display:flex;gap:10px;flex-wrap:wrap;}.row2>div{flex:1;min-width:130px;}
    .qbuild{border:1px solid var(--pk-border);border-radius:10px;padding:12px;margin-bottom:10px;background:#FBFCFE;}
    .qbuild .opt{display:flex;gap:8px;align-items:center;margin:4px 0;}
    .qbuild .opt input[type=text]{flex:1;}
    .opt-take{display:flex;gap:10px;align-items:center;padding:8px 10px;border:1px solid var(--pk-border);border-radius:8px;margin:4px 0;cursor:pointer;}
    .toast{position:fixed;bottom:28px;right:28px;background:var(--pk-ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;z-index:200;}.toast.show{opacity:1;}.toast.success{background:var(--pk-success);}.toast.error{background:var(--pk-danger);}
    .hidden{display:none;}
    .score-big{font-size:40px;font-weight:800;color:var(--pk-blue-800);}
    @media(max-width:640px){.container{padding:14px;}.actions{width:100%;}.actions .btn{flex:1;}}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <a href="../index.html"><img src="../images/panya-schoolkit-lockup.png" alt="Panya SchoolKit" /></a>
      <a class="back-link" id="backLink" data-i18n="quiz.back">← Dashboard</a>
    </div><div></div>
  </div>

  <div class="container">
    <!-- LIST -->
    <div id="listView">
      <div class="page-header">
        <div class="page-title"><h1 data-i18n="quiz.title">📝 Quizzes</h1><p data-i18n="quiz.subtitle">Online tests, auto-graded</p></div>
        <button class="btn btn-primary" id="newBtn" onclick="openBuilder()" style="display:none" data-i18n="quiz.new">➕ New Quiz</button>
      </div>
      <div id="list"><div class="empty">⏳ Loading...</div></div>
    </div>

    <!-- BUILDER (staff) -->
    <div id="builderView" class="hidden">
      <a class="back-link" onclick="showList()" data-i18n="quiz.backList">← Back to list</a>
      <div class="card" style="margin-top:10px;">
        <input type="hidden" id="qzId" />
        <div class="field"><label data-i18n="quiz.fTitle">Quiz title</label><input type="text" id="qzTitle" /></div>
        <div class="row2">
          <div class="field"><label data-i18n="quiz.fSubject">Subject</label><input type="text" id="qzSubject" /></div>
          <div class="field"><label data-i18n="quiz.fClass">Class</label><select id="qzClass"><option value="" data-i18n="quiz.allSchool">Whole school</option></select></div>
          <div class="field"><label data-i18n="quiz.fTime">Time limit (min)</label><input type="number" id="qzTime" min="0" placeholder="—" /></div>
        </div>
        <div class="row2">
          <div class="field"><label data-i18n="quiz.fDue">Due date</label><input type="date" id="qzDue" /></div>
          <div class="field"><label data-i18n="quiz.fStatus">Status</label>
            <select id="qzStatus"><option value="draft" data-i18n="quiz.draft">Draft</option><option value="open" data-i18n="quiz.open">Open</option><option value="closed" data-i18n="quiz.closed">Closed</option></select>
          </div>
        </div>
      </div>
      <h3 style="font-size:15px;margin:14px 0 8px;" data-i18n="quiz.questions">Questions</h3>
      <div id="qList"></div>
      <button class="btn btn-secondary" onclick="addQuestion()" data-i18n="quiz.addQ">➕ Add question</button>
      <div style="margin-top:16px;text-align:right;">
        <button class="btn btn-primary" onclick="saveQuiz()" data-i18n="quiz.save">💾 Save quiz</button>
      </div>
    </div>

    <!-- TAKER (student) -->
    <div id="takerView" class="hidden">
      <a class="back-link" onclick="showList()" data-i18n="quiz.backList">← Back to list</a>
      <div class="card" style="margin-top:10px;">
        <h2 id="takeTitle" style="font-size:19px;"></h2>
        <div class="meta" id="takeMeta" style="font-size:13px;color:var(--pk-ash);margin-top:4px;"></div>
      </div>
      <div id="takeBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/i18n.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/role-guard.js"></script>
  <script>
    let isStaff=false, myStudents=[], rows=[], qStateBuild=[], curQuiz=null;

    document.addEventListener('DOMContentLoaded', async () => {
      const session = await auth.getSession();
      if (!session) { window.location.href='../login.html'; return; }
      try { const { data: prof } = await supabaseClient.from('profiles').select('role').eq('id',session.user.id).maybeSingle();
        isStaff = ['teacher','staff','admin','owner','developer'].includes(prof?.role); } catch {}
      document.getElementById('backLink').setAttribute('href', isStaff?'dashboard.html':'student-dashboard.html');
      if (isStaff) document.getElementById('newBtn').style.display='';
      await loadAux();
      load();
    });
    document.addEventListener('langchange', () => { if(!document.getElementById('listView').classList.contains('hidden')) render(); });

    async function loadAux() {
      try {
        if (isStaff) {
          const { data } = await supabaseClient.from('students').select('classroom').eq('status','active').not('classroom','is',null).limit(5000);
          const classes=[...new Set((data||[]).map(r=>r.classroom).filter(Boolean))].sort();
          const fc=document.getElementById('qzClass'); if(fc) fc.insertAdjacentHTML('beforeend', classes.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join(''));
        } else {
          const { data } = await supabaseClient.from('students').select('id, first_name_th, last_name_th').limit(50);
          myStudents = data || [];
        }
      } catch {}
    }
    function myStudentId(){ return (myStudents[0]&&myStudents[0].id)||null; }

    function showList(){ document.getElementById('listView').classList.remove('hidden'); document.getElementById('builderView').classList.add('hidden'); document.getElementById('takerView').classList.add('hidden'); load(); }

    async function load() {
      document.getElementById('list').innerHTML='<div class="empty">⏳ '+t('common.loading')+'</div>';
      const { data, error } = await supabaseClient.rpc('get_quizzes', { p_status:null, p_mine:false });
      if (error){ document.getElementById('list').innerHTML='<div class="empty">'+esc(error.message)+'</div>'; return; }
      rows = Array.isArray(data)?data:[];
      render();
    }
    function getRow(id){ return rows.find(r=>r.id===id)||{}; }

    function render(){
      const list=document.getElementById('list');
      if(!rows.length){ list.innerHTML=`<div class="empty"><div class="icon">📝</div><h3>${t('quiz.empty')}</h3></div>`; return; }
      list.innerHTML = rows.map(r=>{
        const st = t('quiz.'+r.status)||r.status;
        const mine = r.my_attempt;
        return `<div class="card"><div class="q-card">
          <div class="q-info">
            <h3>${esc(r.title)} <span class="status s-${r.status}">${esc(st)}</span></h3>
            <div class="meta">${r.subject?`<span class="tag">${esc(r.subject)}</span>`:''}${r.classroom?('🎯 '+esc(r.classroom)+' · '):''}❓ ${r.question_count} ${t('quiz.items')}${r.time_limit_minutes?(' · ⏱ '+r.time_limit_minutes+' '+t('quiz.min')):''}${isStaff?(' · 👤 '+(r.attempt_count||0)+' '+t('quiz.done')):''}</div>
          </div>
          <div class="actions">
            ${isStaff?`
              <button class="btn btn-secondary btn-sm" onclick="openBuilder('${r.id}')">✏️</button>
              <button class="btn btn-secondary btn-sm" onclick="viewResults('${r.id}')">📊 ${t('quiz.results')}</button>
              <button class="btn btn-danger btn-sm" onclick="delQuiz('${r.id}')">🗑️</button>
            `:`
              ${mine ? `<span class="status s-open">${mine.score}/${mine.max_score}</span>`
                     : (r.status==='open' ? `<button class="btn btn-primary btn-sm" onclick="takeQuiz('${r.id}')">${t('quiz.take')}</button>` : `<span class="status s-closed">${t('quiz.closed')}</span>`)}
            `}
          </div>
        </div></div>`;
      }).join('');
    }

    // ---------- Builder (staff) ----------
    function openBuilder(id){
      qStateBuild=[]; document.getElementById('qzId').value='';
      document.getElementById('qzTitle').value=''; document.getElementById('qzSubject').value='';
      document.getElementById('qzClass').value=''; document.getElementById('qzTime').value='';
      document.getElementById('qzDue').value=''; document.getElementById('qzStatus').value='draft';
      document.getElementById('listView').classList.add('hidden'); document.getElementById('builderView').classList.remove('hidden');
      if (id) loadQuizForEdit(id); else { addQuestion(); renderQ(); }
    }
    async function loadQuizForEdit(id){
      const { data } = await supabaseClient.rpc('get_quiz', { p_id:id });
      if (!data || data.error){ toast(t('quiz.'+(data&&data.error))||'error','error'); return; }
      document.getElementById('qzId').value=data.id;
      document.getElementById('qzTitle').value=data.title||'';
      document.getElementById('qzSubject').value=data.subject||'';
      document.getElementById('qzClass').value=data.classroom||'';
      document.getElementById('qzTime').value=data.time_limit_minutes||'';
      document.getElementById('qzDue').value=data.due_date||'';
      document.getElementById('qzStatus').value=data.status||'draft';
      qStateBuild = Array.isArray(data.questions)?data.questions.map(q=>({q:q.q||'',type:q.type||'mc',options:q.options||['',''],answer:q.answer||'',points:q.points||1})):[];
      if(!qStateBuild.length) addQuestion();
      renderQ();
    }
    function addQuestion(){ qStateBuild.push({q:'',type:'mc',options:['',''],answer:'',points:1}); renderQ(); }
    function rmQuestion(i){ qStateBuild.splice(i,1); renderQ(); }
    function syncQ(){ // read DOM into state
      qStateBuild.forEach((q,i)=>{
        q.q = (document.getElementById('q_'+i)||{}).value||q.q;
        q.type = (document.getElementById('qt_'+i)||{}).value||q.type;
        q.points = Number((document.getElementById('qp_'+i)||{}).value||1);
        if(q.type==='mc'){
          const opts=[]; document.querySelectorAll('.opt_'+i).forEach(el=>opts.push(el.value));
          q.options=opts;
          const sel=document.querySelector('input[name="correct_'+i+'"]:checked');
          q.answer = sel? opts[Number(sel.value)] : (q.answer||'');
        } else if(q.type==='tf'){
          const sel=document.querySelector('input[name="correct_'+i+'"]:checked');
          q.answer = sel? sel.value : (q.answer||'');
        } else { q.answer=(document.getElementById('qa_'+i)||{}).value||q.answer; }
      });
    }
    function renderQ(){
      const el=document.getElementById('qList');
      el.innerHTML = qStateBuild.map((q,i)=>{
        let body='';
        if(q.type==='mc'){
          body = (q.options&&q.options.length?q.options:['','']).map((o,oi)=>`<div class="opt">
            <input type="radio" name="correct_${i}" value="${oi}" ${q.answer===o&&o!==''?'checked':''} title="${t('quiz.correct')}"/>
            <input type="text" class="opt_${i}" value="${esc(o)}" placeholder="${t('quiz.option')} ${oi+1}"/>
          </div>`).join('') + `<button class="btn btn-secondary btn-sm" onclick="addOpt(${i})">＋ ${t('quiz.option')}</button>`;
        } else if(q.type==='tf'){
          body = `<div class="opt"><label><input type="radio" name="correct_${i}" value="true" ${q.answer==='true'?'checked':''}/> ${t('quiz.true')}</label>
            &nbsp;&nbsp;<label><input type="radio" name="correct_${i}" value="false" ${q.answer==='false'?'checked':''}/> ${t('quiz.false')}</label></div>`;
        } else {
          body = `<div class="field"><label>${t('quiz.answer')}</label><input type="text" id="qa_${i}" value="${esc(q.answer||'')}"/></div>`;
        }
        return `<div class="qbuild">
          <div class="row2">
            <div class="field" style="flex:2;"><label>${t('quiz.qNo')} ${i+1}</label><input type="text" id="q_${i}" value="${esc(q.q||'')}" placeholder="${t('quiz.qText')}"/></div>
            <div class="field" style="max-width:130px;"><label>${t('quiz.qType')}</label>
              <select id="qt_${i}" onchange="syncQ();qStateBuild[${i}].type=this.value;renderQ();">
                <option value="mc" ${q.type==='mc'?'selected':''}>${t('quiz.tMc')}</option>
                <option value="tf" ${q.type==='tf'?'selected':''}>${t('quiz.tTf')}</option>
                <option value="short" ${q.type==='short'?'selected':''}>${t('quiz.tShort')}</option>
              </select></div>
            <div class="field" style="max-width:90px;"><label>${t('quiz.points')}</label><input type="number" id="qp_${i}" min="1" value="${q.points||1}"/></div>
          </div>
          ${body}
          <div style="text-align:right;margin-top:6px;"><button class="btn btn-danger btn-sm" onclick="syncQ();rmQuestion(${i})">🗑️ ${t('quiz.removeQ')}</button></div>
        </div>`;
      }).join('');
    }
    function addOpt(i){ syncQ(); qStateBuild[i].options.push(''); renderQ(); }

    async function saveQuiz(){
      syncQ();
      const title=document.getElementById('qzTitle').value.trim();
      if(!title){ toast(t('quiz.needTitle'),'error'); return; }
      const clean = qStateBuild.filter(q=>(q.q||'').trim()).map(q=>{
        const o={ q:q.q.trim(), type:q.type, answer:(q.answer||'').toString(), points:Number(q.points)||1 };
        if(q.type==='mc') o.options=(q.options||[]).filter(x=>x.trim()!=='');
        return o;
      });
      const payload={ p_id: document.getElementById('qzId').value||null, p_title:title, p_questions:clean,
        p_subject:document.getElementById('qzSubject').value.trim()||null, p_classroom:document.getElementById('qzClass').value||null,
        p_grade:null, p_time_limit_minutes: document.getElementById('qzTime').value?Number(document.getElementById('qzTime').value):null,
        p_due_date: document.getElementById('qzDue').value||null, p_status: document.getElementById('qzStatus').value };
      const { data, error } = await supabaseClient.rpc('save_quiz', payload);
      if(error){ toast(error.message,'error'); return; }
      if(!data.success){ toast(t('quiz.'+data.error)||data.error,'error'); return; }
      toast(t('quiz.saved'),'success'); showList();
    }

    async function delQuiz(id){
      if(!confirm(t('quiz.confirmDelete'))) return;
      const { data, error } = await supabaseClient.rpc('delete_quiz',{p_id:id});
      if(error){ toast(error.message,'error'); return; }
      if(!data.success){ toast(data.error,'error'); return; }
      toast(t('quiz.deleted'),'success'); load();
    }

    async function viewResults(id){
      const { data } = await supabaseClient.rpc('get_quiz_attempts',{p_quiz_id:id});
      const arr=Array.isArray(data)?data:[];
      const r=getRow(id);
      document.getElementById('listView').classList.add('hidden'); document.getElementById('takerView').classList.remove('hidden');
      document.getElementById('takeTitle').textContent = (r.title||'') + ' — '+t('quiz.results');
      document.getElementById('takeMeta').textContent = arr.length+' '+t('quiz.done');
      document.getElementById('takeBody').innerHTML = arr.length? '<div class="card">'+arr.map(a=>{
        const nm=((a.first_name_th||'')+' '+(a.last_name_th||'')).trim()||'—';
        return `<div class="opt-take" style="cursor:default;justify-content:space-between;"><span>${esc(nm)} ${a.classroom?('· '+esc(a.classroom)):''}</span><strong>${a.score}/${a.max_score}</strong></div>`;
      }).join('')+'</div>' : `<div class="empty">${t('quiz.noAttempts')}</div>`;
    }

    // ---------- Taker (student) ----------
    async function takeQuiz(id){
      const sid=myStudentId();
      const { data } = await supabaseClient.rpc('get_quiz',{p_id:id, p_student_id:sid});
      if(!data||data.error){ toast(t('quiz.'+(data&&data.error))||'error','error'); return; }
      curQuiz=data;
      document.getElementById('listView').classList.add('hidden'); document.getElementById('takerView').classList.remove('hidden');
      document.getElementById('takeTitle').textContent=data.title||'';
      document.getElementById('takeMeta').textContent=(data.subject?data.subject+' · ':'')+(data.time_limit_minutes?(data.time_limit_minutes+' '+t('quiz.min')):'');
      if(data.my_attempt){ // already done
        document.getElementById('takeBody').innerHTML=`<div class="card" style="text-align:center;"><div class="score-big">${data.my_attempt.score}/${data.my_attempt.max_score}</div><p style="color:var(--pk-ash);margin-top:6px;">${t('quiz.alreadyDone')}</p></div>`;
        return;
      }
      const qs=data.questions||[];
      document.getElementById('takeBody').innerHTML = qs.map((q,i)=>{
        let body='';
        if(q.type==='mc'){ body=(q.options||[]).map(o=>`<label class="opt-take"><input type="radio" name="ans_${i}" value="${esc(o)}"/> ${esc(o)}</label>`).join(''); }
        else if(q.type==='tf'){ body=`<label class="opt-take"><input type="radio" name="ans_${i}" value="true"/> ${t('quiz.true')}</label><label class="opt-take"><input type="radio" name="ans_${i}" value="false"/> ${t('quiz.false')}</label>`; }
        else { body=`<input type="text" id="ans_${i}" class="field" style="width:100%;padding:9px 12px;border:1px solid var(--pk-border);border-radius:8px;"/>`; }
        return `<div class="card"><div style="font-weight:600;margin-bottom:8px;">${i+1}. ${esc(q.q||'')} <span style="color:var(--pk-mist);font-weight:400;font-size:12px;">(${q.points||1})</span></div>${body}</div>`;
      }).join('') + `<div style="text-align:right;"><button class="btn btn-primary" onclick="submitQuiz()" data-i18n="quiz.submit">📤 Submit</button></div>`;
    }
    async function submitQuiz(){
      const sid=myStudentId();
      if(!sid){ toast(t('quiz.noStudent'),'error'); return; }
      const qs=curQuiz.questions||[]; const answers={};
      qs.forEach((q,i)=>{
        if(q.type==='short'){ answers[i]=(document.getElementById('ans_'+i)||{}).value||''; }
        else { const sel=document.querySelector('input[name="ans_'+i+'"]:checked'); answers[i]=sel?sel.value:''; }
      });
      const { data, error } = await supabaseClient.rpc('submit_quiz',{p_quiz_id:curQuiz.id, p_student_id:sid, p_answers:answers});
      if(error){ toast(error.message,'error'); return; }
      if(!data.success){ toast(t('quiz.'+data.error)||data.error,'error'); return; }
      document.getElementById('takeBody').innerHTML=`<div class="card" style="text-align:center;"><div class="score-big">${data.score}/${data.max_score}</div><p style="color:var(--pk-ash);margin-top:6px;">${t('quiz.submitted')}</p><button class="btn btn-secondary" style="margin-top:12px;" onclick="showList()">${t('quiz.backList')}</button></div>`;
    }

    function esc(s){ return String(s ?? '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function toast(m,ty='info'){ const tt=document.getElementById('toast'); tt.className='toast show '+ty; tt.textContent=m; setTimeout(()=>tt.className='toast',3500); }
  </script>
</body>
</html>
