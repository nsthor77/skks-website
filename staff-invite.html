<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Invite — SKKS</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="images/logo.png" />
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #EEF2FF 0%, #DCFCE7 100%);
      font-family: 'Prompt', 'Sarabun', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container { width: 100%; max-width: 460px; }
    
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(30, 58, 95, 0.12);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    
    .logo img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      margin-bottom: 12px;
    }
    
    .logo h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #1E3A5F;
      margin: 0 0 6px 0;
    }
    
    .logo p {
      font-size: 13px;
      color: #6B7280;
      margin: 0;
    }
    
    .badge {
      display: inline-block;
      padding: 4px 12px;
      background: #DCFCE7;
      color: #166534;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    
    .form { display: flex; flex-direction: column; gap: 14px; }
    
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }
    
    .form-group input {
      padding: 12px 14px;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    
    .form-group input:focus {
      border-color: #7CB342;
      box-shadow: 0 0 0 4px rgba(124, 179, 66, 0.1);
    }
    
    .code-input {
      font-family: 'Poppins', monospace !important;
      font-size: 16px !important;
      letter-spacing: 2px !important;
      text-transform: uppercase !important;
      text-align: center;
      font-weight: 600 !important;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    
    .btn {
      padding: 13px 24px;
      background: linear-gradient(135deg, #7CB342, #5BB8E0);
      color: white;
      border: none;
      border-radius: 100px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      font-family: inherit;
    }
    
    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(124, 179, 66, 0.3);
    }
    
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .alert {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 12px;
      margin-bottom: 14px;
      display: none;
    }
    
    .alert.show { display: block; }
    .alert.error { background: #FEE2E2; color: #991B1B; border-left: 4px solid #EF4444; }
    .alert.success { background: #DCFCE7; color: #166534; border-left: 4px solid #16A34A; }
    .alert.info { background: #DBEAFE; color: #1E40AF; border-left: 4px solid #5BB8E0; }
    
    .role-display {
      background: #F0FDF4;
      border-left: 4px solid #16A34A;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #166534;
      display: none;
    }
    
    .role-display.show { display: block; }
    
    .role-display strong {
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .footer-link {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
    }
    
    .footer-link a {
      color: #5BB8E0;
      text-decoration: none;
      font-weight: 600;
    }
    
    .back-home {
      text-align: center;
      margin-top: 18px;
    }
    
    .back-home a {
      color: white;
      text-decoration: none;
      font-size: 13px;
      opacity: 0.9;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <img src="images/logo.png" alt="SKKS" />
        <h1>Staff Invitation</h1>
        <p>Suanson Khon Kaen School</p>
        <span class="badge">By Invite Only</span>
      </div>
      
      <div class="alert" id="alertBox"></div>
      
      <!-- STEP 1: Validate code -->
      <form class="form" id="stepValidate" onsubmit="handleValidate(event)">
        <div class="form-group">
          <label>Invite Code</label>
          <input type="text" id="inviteCode" class="code-input" required placeholder="SKKS-XXXX-XXXX" maxlength="14" autocomplete="off" />
        </div>
        
        <button type="submit" class="btn" id="validateBtn">Validate Code →</button>
        
        <div class="footer-link">
          Don't have a code? <a href="/login.html">Sign up as Student/Parent</a>
        </div>
      </form>
      
      <!-- STEP 2: Sign up -->
      <form class="form" id="stepSignup" onsubmit="handleSignup(event)" style="display:none;">
        <div class="role-display show" id="roleDisplay">
          ✅ Code valid! You'll be registered as <strong id="targetRole">staff</strong>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="firstName" required placeholder="John" />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lastName" required placeholder="Doe" />
          </div>
        </div>
        
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="you@suansonkk.com" autocomplete="email" />
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required minlength="8" placeholder="At least 8 characters" autocomplete="new-password" />
        </div>
        
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="passwordConfirm" required minlength="8" placeholder="Re-type password" autocomplete="new-password" />
        </div>
        
        <button type="submit" class="btn" id="signupBtn">Create Staff Account</button>
        
        <div class="footer-link">
          <a href="#" onclick="event.preventDefault();backToValidate()">← Use a different code</a>
        </div>
      </form>
    </div>
    
    <div class="back-home">
      <a href="/">← Back to Home</a>
    </div>
  </div>
  
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    let validatedCode = null;
    let validatedRole = null;
    let intendedEmail = null;
    
    function showAlert(msg, type = 'error') {
      const a = document.getElementById('alertBox');
      a.className = 'alert show ' + type;
      a.textContent = msg;
    }
    
    function hideAlert() {
      document.getElementById('alertBox').className = 'alert';
    }
    
    // Auto-format invite code (uppercase + dashes)
    document.getElementById('inviteCode').addEventListener('input', (e) => {
      let v = e.target.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
      // Auto-add dashes
      v = v.replace(/-/g, '');
      if (v.length > 4) v = v.substring(0,4) + '-' + v.substring(4);
      if (v.length > 9) v = v.substring(0,9) + '-' + v.substring(9, 13);
      e.target.value = v;
    });
    
    // STEP 1: Validate code
    async function handleValidate(event) {
      event.preventDefault();
      hideAlert();
      
      const code = document.getElementById('inviteCode').value.trim().toUpperCase();
      const btn = document.getElementById('validateBtn');
      
      btn.disabled = true;
      btn.textContent = '⏳ Validating...';
      
      const { data, error } = await supabaseClient
        .rpc('validate_invite_code', { p_code: code });
      
      if (error) {
        showAlert('❌ ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Validate Code →';
        return;
      }
      
      if (!data.valid) {
        showAlert('❌ ' + data.error, 'error');
        btn.disabled = false;
        btn.textContent = 'Validate Code →';
        return;
      }
      
      // Valid! Move to step 2
      validatedCode = code;
      validatedRole = data.target_role;
      intendedEmail = data.intended_email;
      
      document.getElementById('targetRole').textContent = data.target_role;
      document.getElementById('stepValidate').style.display = 'none';
      document.getElementById('stepSignup').style.display = 'flex';
      
      // Pre-fill email if intended
      if (intendedEmail) {
        document.getElementById('email').value = intendedEmail;
        document.getElementById('email').readOnly = true;
      }
      
      btn.disabled = false;
      btn.textContent = 'Validate Code →';
    }
    
    // STEP 2: Sign up
    async function handleSignup(event) {
      event.preventDefault();
      hideAlert();
      
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;
      const btn = document.getElementById('signupBtn');
      
      if (password !== passwordConfirm) {
        showAlert('❌ Passwords do not match', 'error');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '⏳ Creating account...';
      
      // Step A: Sign up
      const signupResult = await auth.signup({
        email,
        password,
        firstName,
        lastName,
        role: 'student'  // temp - will be updated after redeem
      });
      
      if (!signupResult.success) {
        showAlert('❌ ' + signupResult.error, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Staff Account';
        return;
      }
      
      // Step B: Sign in (so we have auth context)
      const loginResult = await auth.login({ email, password });
      
      if (!loginResult.success) {
        showAlert('⚠️ Account created but auto-login failed. Please sign in manually.', 'info');
        setTimeout(() => window.location.href = '/login.html', 3000);
        return;
      }
      
      // Step C: Redeem invite code
      const { data, error } = await supabaseClient
        .rpc('redeem_invite_code', { p_code: validatedCode });
      
      if (error || !data.success) {
        showAlert('⚠️ Account created but code redemption failed: ' + (data?.error || error?.message), 'info');
        setTimeout(() => window.location.href = '/login.html', 3000);
        return;
      }
      
      // Success!
      showAlert('🎉 Account created! Role: ' + data.role, 'success');
      setTimeout(() => {
        window.location.href = '/pages/dashboard.html';
      }, 2000);
    }
    
    function backToValidate() {
      document.getElementById('stepValidate').style.display = 'flex';
      document.getElementById('stepSignup').style.display = 'none';
      hideAlert();
      validatedCode = null;
      validatedRole = null;
    }
  </script>
</body>
</html>
